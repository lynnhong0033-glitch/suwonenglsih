<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>수원 수능영어 학습관리</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eee;--dim:#888;--green:#27ae60;--gold:#f1c40f;--blue:#3498db}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;border:none;border-radius:8px;padding:8px 16px;font-size:14px;transition:.2s}
button:hover{filter:brightness(1.15)}
input,select,textarea{border-radius:8px;border:1px solid #333;padding:8px 12px;font-size:14px;background:#0d1b2a;color:var(--text)}
/* Role Selection */
.role-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.role-screen h1{font-size:28px;color:var(--accent)}
.role-screen .sub{color:var(--dim);font-size:14px;margin-bottom:20px}
.role-btn{width:200px;padding:16px;font-size:18px;font-weight:700;border-radius:12px;color:#fff}
.role-btn.teacher{background:var(--accent2)}
.role-btn.student{background:var(--accent)}
.role-btn.parent{background:var(--green)}
/* Password Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:var(--card);padding:32px;border-radius:16px;text-align:center;min-width:300px}
.modal h3{margin-bottom:16px}
.modal input{width:100%;margin-bottom:12px}
.modal .auto-login{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--dim)}
.modal .auto-login input[type=checkbox]{width:auto}
.modal button{background:var(--accent);color:#fff;width:100%;padding:12px;font-size:16px}
/* Header */
.header{background:var(--card);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent)}
.header .title{font-weight:700;font-size:18px}
.header .right{display:flex;gap:12px;align-items:center}
.header .dday{background:var(--accent);padding:4px 12px;border-radius:20px;font-weight:700;font-size:13px}
.header .logout-btn{background:#333;color:#fff;font-size:12px;padding:6px 12px}
/* Tabs */
.tab-bar{display:flex;background:var(--card);overflow-x:auto;border-bottom:1px solid #333}
.tab-bar button{flex:1;padding:12px 8px;background:transparent;color:var(--dim);font-size:13px;font-weight:600;border-radius:0;border-bottom:3px solid transparent;white-space:nowrap}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Main */
.main{padding:16px;max-width:900px;margin:0 auto}
/* Cards */
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{margin-bottom:12px;font-size:16px;display:flex;align-items:center;gap:8px}
/* Zoom Banner */
.zoom-banner{background:linear-gradient(135deg,#0f3460,#e94560);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.2s}
.zoom-banner:hover{transform:scale(1.01)}
.zoom-banner .zoom-text{font-weight:700;font-size:16px}
.zoom-banner .zoom-sub{font-size:12px;color:rgba(255,255,255,.7)}
.zoom-banner .zoom-icon{font-size:28px}
/* Welcome Message */
.welcome-msg{background:linear-gradient(135deg,#16213e,#0f3460);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:15px;line-height:1.6}
/* Star */
.star{cursor:pointer;font-size:20px;color:#555;transition:.2s;user-select:none}
.star.active{color:var(--gold)}
.star:hover{transform:scale(1.2)}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--accent2);padding:10px 8px;text-align:left}
td{padding:8px;border-bottom:1px solid #222}
tr:hover{background:rgba(255,255,255,.03)}
/* Homework in Dashboard */
.hw-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222}
.hw-item .hw-subject{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:700}
.hw-item .hw-subject.eng{background:#2980b9;color:#fff}
.hw-item .hw-subject.kor{background:#27ae60;color:#fff}
.hw-item .hw-subject.math{background:#8e44ad;color:#fff}
.hw-done{text-decoration:line-through;color:var(--dim)}
/* Quiz */
.quiz-options{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.quiz-opt{padding:12px 16px;background:#0d1b2a;border:2px solid #333;border-radius:10px;text-align:left;color:var(--text);font-size:14px;transition:.2s}
.quiz-opt:hover{border-color:var(--blue)}
.quiz-opt.correct{border-color:var(--green);background:rgba(39,174,96,.15)}
.quiz-opt.wrong{border-color:var(--accent);background:rgba(233,69,96,.15)}
/* Score badge */
.score-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-weight:700;font-size:14px}
.score-badge.high{background:var(--green);color:#fff}
.score-badge.mid{background:var(--gold);color:#000}
.score-badge.low{background:var(--accent);color:#fff}
/* Custom Word */
.cw-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cw-row input{flex:1;min-width:120px}
.cw-row button{white-space:nowrap}
/* Filter Buttons */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-bar button{padding:6px 14px;font-size:12px;background:#222;color:var(--dim);border-radius:20px}
.filter-bar button.active{background:var(--accent);color:#fff}
/* Responsive */
@media(max-width:600px){.role-btn{width:160px;padding:12px;font-size:15px}.main{padding:12px}.card{padding:14px}}
/* Passage star */
.passage-star{position:absolute;top:8px;right:8px}
.passage-card{position:relative;background:#0d1b2a;border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid #222}
.passage-card.starred{border-color:var(--gold)}
/* Parent view */
.parent-stat{text-align:center;padding:20px}
.parent-stat .big-num{font-size:48px;font-weight:700;color:var(--accent)}
.parent-stat .label{color:var(--dim);font-size:14px;margin-top:4px}
/* Progress bar */
.progress-bar{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
/* Leaving message */
.leaving-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999}
.leaving-box{background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:40px;text-align:center;max-width:400px}
.leaving-box .emoji{font-size:48px;margin-bottom:12px}
.leaving-box .msg{font-size:18px;line-height:1.6;margin-bottom:20px}
.leaving-box button{background:var(--accent);color:#fff;padding:10px 30px;font-size:15px}
</style>
</head>
<body>
<div id="app"></div>

<script>

// ========== D-DAY ==========
function getDday(){
  const now=new Date();
  const diff=EXAM_DATE-now;
  return Math.ceil(diff/(1000*60*60*24));
}

// ========== SUPABASE HELPERS ==========
async function sbFetch(table,method='GET',body=null,query=''){
  const url=`${SB_URL}/rest/v1/${table}${query}`;
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  try{const r=await fetch(url,opts);return await r.json();}catch(e){console.error(e);return[];}
}
async function loadAll(){
  [schedules,homework,quizHistory,customWords]=await Promise.all([
    sbFetch('schedules','GET',null,'?order=date.asc'),
    sbFetch('homework','GET',null,'?order=created_at.desc'),
    sbFetch('quiz_history','GET',null,'?order=created_at.desc'),
    sbFetch('custom_words','GET',null,'?order=created_at.desc')
  ]);
}

// ========== LOCAL STORAGE ==========
function lsGet(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}

// ========== STARRED ITEMS ==========
function getStars(type){return lsGet(`stars_${type}`,{});}
function toggleStar(type,id){
  const s=getStars(type);
  if(s[id])delete s[id];else s[id]=true;
  lsSet(`stars_${type}`,s);
  return !!s[id];
}
function isStarred(type,id){return !!getStars(type)[id];}

// ========== RENDER STAR ==========
function starHTML(type,id){
  const active=isStarred(type,id);
  return `<span class="star ${active?'active':''}" onclick="handleStar('${type}','${id}',this)">
    ${active?'★':'☆'}
  </span>`;
}
function handleStar(type,id,el){
  const now=toggleStar(type,id);
  el.className=`star ${now?'active':''}`;
  el.textContent=now?'★':'☆';
}

// ========== ZOOM LINK ==========
function getZoom(){return lsGet('zoom_link','');}
function setZoom(v){lsSet('zoom_link',v);}

// ========== APP INIT ==========
function init(){
  const savedRole=lsGet('saved_role');
  const autoLogin=lsGet('auto_login',false);
  if(savedRole&&autoLogin){
    role=savedRole;
    startApp();
  }else{
    showRoleScreen();
  }
}

function showRoleScreen(){
  document.getElementById('app').innerHTML=`
    <div class="role-screen">
      <h1>📚 수원 수능영어</h1>
      <div class="sub">2027학년도 수능 D-${getDday()}</div>
      <div style="color:var(--dim);font-size:13px;margin-bottom:8px;text-align:center">"${QUOTES[Math.floor(Math.random()*QUOTES.length)]}"</div>
      <button class="role-btn teacher" onclick="selectRole('teacher')">👩‍🏫 선생님</button>
      <button class="role-btn student" onclick="selectRole('student')">📖 학생</button>
      <button class="role-btn parent" onclick="selectRole('parent')">👨‍👩‍👧 학부모</button>
    </div>`;
}

function selectRole(r){
  role=r;
  if(r==='student'){startApp();return;}
  // Teacher & Parent need password
  showPwModal(r);
}

function showPwModal(r){
  const label=r==='teacher'?'선생님':'학부모';
  const savedPw=lsGet(`pw_${r}`,'');
  const autoChecked=lsGet('auto_login',false);
  document.getElementById('app').innerHTML+=`
    <div class="modal-overlay" id="pwModal">
      <div class="modal">
        <h3>${label} 비밀번호</h3>
        <input type="password" id="pwInput" placeholder="비밀번호 입력" value="${savedPw}">
        <div class="auto-login">
          <input type="checkbox" id="autoLogin" ${autoChecked?'checked':''}>
          <label for="autoLogin">자동 로그인 (비밀번호 저장)</label>
        </div>
        <button onclick="checkPw('${r}')">입장</button>
      </div>
    </div>`;
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw(r);});
}

function checkPw(r){
  const pw=document.getElementById('pwInput').value;
  const auto=document.getElementById('autoLogin').checked;
  if(pw===PW){
    if(auto){lsSet(`pw_${r}`,pw);lsSet('auto_login',true);lsSet('saved_role',r);}
    else{localStorage.removeItem(`pw_${r}`);lsSet('auto_login',false);localStorage.removeItem('saved_role');}
    role=r;
    startApp();
  }else{
    alert('비밀번호가 틀렸어요!');
  }
}

function logout(){
  if(role==='student'){
    showLeavingMsg();
  }else{
    role=null;activeTab=0;
    showRoleScreen();
  }
}

function showLeavingMsg(){
  const msg=BYE[Math.floor(Math.random()*BYE.length)];
  document.getElementById('app').innerHTML+=`
    <div class="leaving-overlay" id="leaveOverlay">
      <div class="leaving-box">
        <div class="emoji">🌙</div>
        <div class="msg">${msg}</div>
        <button onclick="finishLogout()">고마워! 👋</button>
      </div>
    </div>`;
}
function finishLogout(){
  role=null;activeTab=0;
  showRoleScreen();
}

// ========== START APP ==========
async function startApp(){
  document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;color:var(--dim)">로딩 중...</div>';
  await loadAll();
  renderApp();
}

function getTabs(){
  if(role==='teacher')return['대시보드','수업일정','숙제관리','단어학습','단어시험','본문학습','성적관리'];
  if(role==='student')return['대시보드','단어학습','단어시험','나만의단어장','본문학습','오답노트','성적'];
  return['대시보드','숙제현황','성적현황'];
}

function renderApp(){
  const tabs=getTabs();
  const dday=getDday();
  const welcomeMsg=role==='student'?WELCOME[Math.floor(Math.random()*WELCOME.length)]:'';
  
  document.getElementById('app').innerHTML=`
    <div class="header">
      <div class="title">📚 수원 수능영어</div>
      <div class="right">
        <span class="dday">D-${dday}</span>
        <button class="logout-btn" onclick="logout()">나가기</button>
      </div>
    </div>
    ${role==='student'?`<div class="welcome-msg">${welcomeMsg}</div>`:''}
    <div class="tab-bar" id="tabBar">
      ${tabs.map((t,i)=>`<button class="${i===activeTab?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('')}
    </div>
    <div class="main" id="mainContent"></div>`;
  
  renderTab();
}

function switchTab(i){activeTab=i;renderApp();}

function renderTab(){
  const tabs=getTabs();
  const name=tabs[activeTab];
  const el=document.getElementById('mainContent');
  
  switch(role){
    case 'teacher':
      if(name==='대시보드')renderDashboard(el);
      else if(name==='수업일정')renderSchedule(el);
      else if(name==='숙제관리')renderHomework(el);
      else if(name==='단어학습')renderVocabLearn(el);
      else if(name==='단어시험')renderVocabQuiz(el);
      else if(name==='본문학습')renderPassage(el);
      else if(name==='성적관리')renderGrades(el);
      break;
    case 'student':
      if(name==='대시보드')renderDashboard(el);
      else if(name==='단어학습')renderVocabLearn(el);
      else if(name==='단어시험')renderVocabQuiz(el);
      else if(name==='나만의단어장')renderCustomWords(el);
      else if(name==='본문학습')renderPassage(el);
      else if(name==='오답노트')renderWrongNote(el);
      else if(name==='성적')renderGrades(el);
      break;
    case 'parent':
      if(name==='대시보드')renderParentDash(el);
      else if(name==='숙제현황')renderParentHw(el);
      else if(name==='성적현황')renderParentGrades(el);
      break;
  }
}

// ========== DASHBOARD ==========

function showAddSchedule(){
  document.getElementById('addScheduleForm').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input type="date" id="schDate">
      <input type="time" id="schTime" value="22:00">
      <input id="schTopic" placeholder="수업 내용" value="영어수업">
      <button style="background:var(--green);color:#fff" onclick="addSchedule()">추가</button>
    </div>`;
}

async function addSchedule(){
  const date=document.getElementById('schDate').value;
  const time=document.getElementById('schTime').value;
  const topic=document.getElementById('schTopic').value;
  if(!date)return alert('날짜를 선택하세요');
  await sbFetch('schedules','POST',{date,time,topic});
  await loadAll();renderApp();
}

async function autoGenSchedule(){
  if(!confirm('금요일 22:00, 일요일 10:00 일정을 수능일까지 자동 생성할까요?'))return;
  const now=new Date();
  const entries=[];
  let d=new Date(now);
  d.setDate(d.getDate()+(5-d.getDay()+7)%7); // next Friday
  while(d<=EXAM_DATE){
    entries.push({date:d.toISOString().split('T')[0],time:'22:00',topic:'영어수업'});
    const sun=new Date(d);sun.setDate(sun.getDate()+2);
    if(sun<=EXAM_DATE)entries.push({date:sun.toISOString().split('T')[0],time:'10:00',topic:'영어수업'});
    d.setDate(d.getDate()+7);
  }
  for(const e of entries){await sbFetch('schedules','POST',e);}
  await loadAll();renderApp();
  alert(`${entries.length}개 일정이 생성되었습니다!`);
}

async function delSchedule(id){
  await sbFetch('schedules','DELETE',null,`?id=eq.${id}`);
  await loadAll();renderApp();
}

// ========== HOMEWORK ==========
function renderHomework(el){
  const pending=homework.filter(h=>!h.done);
  const done=homework.filter(h=>h.done);
  el.innerHTML=`
    <div class="card">
      <h3>📝 숙제 관리</h3>
      ${role==='teacher'?`
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <select id="hwSubject"><option>영어</option><option>국어</option><option>수학</option></select>
          <input id="hwTitle" placeholder="숙제 내용" style="flex:1;min-width:150px">
          <input type="date" id="hwDue">
          <button style="background:var(--green);color:#fff" onclick="addHw()">추가</button>
        </div>
      `:''}
      <h4 style="margin:12px 0 8px;color:var(--accent)">📌 미완료 (${pending.length})</h4>
      ${pending.map(h=>`
        <div class="hw-item">
          <div>
            <span class="hw-subject ${h.subject==='영어'?'eng':h.subject==='국어'?'kor':'math'}">${h.subject}</span>
            <span style="margin-left:8px">${h.title}</span>
            <span style="font-size:11px;color:var(--dim);margin-left:8px">${h.due_date||''}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button style="background:var(--green);color:#fff;font-size:11px;padding:4px 8px" onclick="toggleHw(${h.id},true)">완료</button>
            ${role==='teacher'?`<button style="background:var(--accent);color:#fff;font-size:11px;padding:4px 8px" onclick="delHw(${h.id})">삭제</button>`:''}
          </div>
        </div>
      `).join('')}
      <h4 style="margin:16px 0 8px;color:var(--green)">✅ 완료 (${done.length})</h4>
      ${done.slice(0,10).map(h=>`
        <div class="hw-item hw-done">
          <div>
            <span class="hw-subject ${h.subject==='영어'?'eng':h.subject==='국어'?'kor':'math'}">${h.subject}</span>
            <span style="margin-left:8px">${h.title}</span>
          </div>
          <button style="background:#333;color:#fff;font-size:11px;padding:4px 8px" onclick="toggleHw(${h.id},false)">복원</button>
        </div>
      `).join('')}
    </div>`;
}

async function addHw(){
  const subject=document.getElementById('hwSubject').value;
  const title=document.getElementById('hwTitle').value;
  const due_date=document.getElementById('hwDue').value;
  if(!title)return alert('숙제 내용을 입력하세요');
  await sbFetch('homework','POST',{subject,title,due_date,done:false});
  await loadAll();renderApp();
}
async function toggleHw(id,done){
  await sbFetch('homework','PATCH',{done},`?id=eq.${id}`);
  await loadAll();renderApp();
}
async function delHw(id){
  await sbFetch('homework','DELETE',null,`?id=eq.${id}`);
  await loadAll();renderApp();
}

function renderParentDash(el){
  const dday=getDday();

  const pendingHw=homework.filter(h=>!h.done);
  const doneHw=homework.filter(h=>h.done);
  const total=homework.length||1;
  const pct=Math.round(doneHw.length/total*100);
  const avgScore=quizHistory.length>0?Math.round(quizHistory.reduce((a,q)=>a+q.score,0)/quizHistory.length):0;
  
  el.innerHTML=`
    ${zoom?`<div class="zoom-banner" onclick="window.open('${zoom}','_blank')">
      <div><div class="zoom-text">🎥 Zoom 수업 참관</div><div class="zoom-sub">클릭하면 Zoom으로 이동합니다</div></div>
      <div class="zoom-icon">→</div>

      <div class="card parent-stat">
        <div class="big-num" style="color:var(--accent)">D-${dday}</div>
        <div class="label">수능까지</div>
      </div>
      <div class="card parent-stat">
        <div class="big-num" style="color:var(--blue)">${avgScore}점</div>

    </div>
    <div class="card">
      <h3>📝 숙제 진행률</h3>
      <div style="display:flex;justify-content:space-between;font-size:14px">
        <span>완료: ${doneHw.length}/${total}</span>
        <span style="font-weight:700;color:${pct>=80?'var(--green)':pct>=50?'var(--gold)':'var(--accent)'}">${pct}%</span>

      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--gold)':'var(--accent)'}"></div></div>
      ${pendingHw.length>0?`<div style="margin-top:12px;font-size:13px;color:var(--dim)">미완료 숙제 ${pendingHw.length}개</div>`:'<div style="margin-top:12px;color:var(--green)">모든 숙제 완료! 👏</div>'}

      ${quizHistory.slice(0,5).map(q=>{

        return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222">
          <span style="font-size:13px">${q.quiz_type||'단어'} ${q.section||''} ${q.lesson||''}</span>

        </div>`;
      }).join('')||'<div style="color:var(--dim)">아직 시험 기록이 없어요</div>'}
    </div>`;
}

          <option value="kor2eng">한글 → 영어</option>
          <option value="listen">듣기 → 한글</option>

        </select>

      <button style="background:var(--accent);color:#fff;width:100%;padding:14px;font-size:16px;font-weight:700" onclick="startQuiz()">시험 시작! 🚀</button>

    <div class="card">
      <h3>📊 최근 시험 기록</h3>
      <table>
        <tr><th>날짜</th><th>유형</th><th>범위</th><th>점수</th></tr>
        ${quizHistory.slice(0,10).map(q=>{
          const sc=q.score>=90?'high':q.score>=70?'mid':'low';
          return `<tr>
            <td style="font-size:12px">${(q.created_at||'').slice(0,10)}</td>
            <td>${q.quiz_type||''}</td>
            <td style="font-size:12px">${q.section||''} ${q.lesson||''}</td>

}

function updateQzLessons(){
  const section=document.getElementById('qzSection').value;
  const lessons=Object.keys(ALL_VOCAB[section]||{});
  const box=document.getElementById('qzLessonBox');
  box.innerHTML=lessons.map(l=>`
    <label style="display:flex;align-items:center;gap:4px;background:#0d1b2a;padding:4px 10px;border-radius:8px;font-size:13px;cursor:pointer">
      <input type="checkbox" value="${l}" class="qzLessonCb" checked> ${l}
    </label>
  `).join('');
}

function startQuiz(){
  const section=document.getElementById('qzSection').value;
  const checkedLessons=[...document.querySelectorAll('.qzLessonCb:checked')].map(cb=>cb.value);
  const type=document.getElementById('qzType').value;
  const countVal=document.getElementById('qzCount').value;
  
  if(checkedLessons.length===0)return alert('강을 하나 이상 선택하세요!');
  
  // Gather words
  let pool=[];
  checkedLessons.forEach(l=>{
    const words=(ALL_VOCAB[section]||{})[l]||[];
    words.forEach((w,i)=>pool.push({eng:w[0],kor:w[1],section,lesson:l,idx:i}));
  });
  
  if(pool.length===0)return alert('선택한 범위에 단어가 없습니다');
  
  // Shuffle
  pool.sort(()=>Math.random()-0.5);
  
  const count=countVal==='all'?pool.length:Math.min(parseInt(countVal),pool.length);
  pool=pool.slice(0,count);
  
  // Generate quiz questions
  const questions=pool.map(w=>{
    if(type==='eng2kor'||type==='listen'){
      // Show English (or play audio), pick Korean answer
      const correct=w.kor;
      const wrongs=getRandomKorOptions(section,checkedLessons,correct,3);
      const options=shuffle([correct,...wrongs]);
      return{question:w.eng,answer:correct,options,type,word:w};
    }else{
      // Show Korean, pick English answer
      const correct=w.eng;
      const wrongs=getRandomEngOptions(section,checkedLessons,correct,3);
      const options=shuffle([correct,...wrongs]);
      return{question:w.kor,answer:correct,options,type,word:w};
    }
  });
  
  quizState={
    active:true,
    questions,
    current:0,
    correct:0,
    wrong:[],
    section,
    lessons:checkedLessons.join(','),
    type:type==='eng2kor'?'영→한':type==='kor2eng'?'한→영':'듣기',
    total:questions.length
  };
  
  renderApp();
}

function getRandomKorOptions(section,lessons,exclude,count){
  const pool=[];
  lessons.forEach(l=>{
    ((ALL_VOCAB[section]||{})[l]||[]).forEach(w=>{if(w[1]!==exclude)pool.push(w[1]);});
  });
  pool.sort(()=>Math.random()-0.5);
  return pool.slice(0,count);
}

function getRandomEngOptions(section,lessons,exclude,count){
  const pool=[];
  lessons.forEach(l=>{
    ((ALL_VOCAB[section]||{})[l]||[]).forEach(w=>{if(w[0]!==exclude)pool.push(w[0]);});
  });
  pool.sort(()=>Math.random()-0.5);
  return pool.slice(0,count);
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function renderQuizInProgress(el){
  const q=quizState.questions[quizState.current];
  const progress=Math.round((quizState.current/quizState.total)*100);
  
  el.innerHTML=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--dim)">
        <span>${quizState.type} | ${quizState.section}</span>
        <span>${quizState.current+1} / ${quizState.total}</span>
      </div>
      <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${progress}%;background:var(--accent)"></div></div>
      
      ${q.type==='listen'?`
        <div style="text-align:center;margin-bottom:16px">
          <button style="background:var(--blue);color:#fff;padding:12px 30px;font-size:18px;border-radius:50%" onclick="speak('${q.question.replace(/'/g,"\\'")}')">🔊 듣기</button>
        </div>
      `:`
        <div style="text-align:center;font-size:24px;font-weight:700;margin:20px 0">${q.question}</div>
      `}
      
      <div class="quiz-options" id="quizOpts">
        ${q.options.map((opt,i)=>`
          <button class="quiz-opt" onclick="answerQuiz(${i},'${opt.replace(/'/g,"\\'")}')">${opt}</button>
        `).join('')}
      </div>
    </div>`;
  
  if(q.type==='listen')speak(q.question);
}

function answerQuiz(idx,selected){
  const q=quizState.questions[quizState.current];
  const isCorrect=selected===q.answer;
  
  if(isCorrect)quizState.correct++;
  else quizState.wrong.push({question:q.question,answer:q.answer,selected,word:q.word});
  
  // Show feedback
  const btns=document.querySelectorAll('.quiz-opt');
  btns.forEach((btn,i)=>{
    btn.disabled=true;
    btn.onclick=null;
    if(btn.textContent.trim()===q.answer)btn.classList.add('correct');
    if(i===idx&&!isCorrect)btn.classList.add('wrong');
  });
  
  setTimeout(()=>{
    quizState.current++;
    if(quizState.current>=quizState.total){
      finishQuiz();
    }else{
      renderApp();
    }
  },isCorrect?500:1200);
}

async function finishQuiz(){
  const score=Math.round((quizState.correct/quizState.total)*100);
  quizState.active=false;
  
  // Save to Supabase
  await sbFetch('quiz_history','POST',{
    quiz_type:quizState.type,
    section:quizState.section,
    lesson:quizState.lessons,
    score,
    total:quizState.total,
    correct_count:quizState.correct
  });
  
  // Save wrong words to localStorage for 오답노트
  const wrongNotes=lsGet('wrong_notes',[]);
  quizState.wrong.forEach(w=>{
    if(!wrongNotes.find(n=>n.eng===w.word.eng&&n.section===w.word.section)){
      wrongNotes.push({eng:w.word.eng,kor:w.word.kor,section:w.word.section,lesson:w.word.lesson,date:new Date().toISOString().slice(0,10)});
    }
  });
  lsSet('wrong_notes',wrongNotes);
  
  await loadAll();
  
  // Praise
  let praiseMsg='';
  if(score===100)praiseMsg=PRAISE.perfect[Math.floor(Math.random()*PRAISE.perfect.length)];
  else if(score>=90)praiseMsg=PRAISE.high[Math.floor(Math.random()*PRAISE.high.length)];
  else if(score>=70)praiseMsg=PRAISE.mid[Math.floor(Math.random()*PRAISE.mid.length)];
  else praiseMsg=PRAISE.low[Math.floor(Math.random()*PRAISE.low.length)];
  
  const el=document.getElementById('mainContent');
  el.innerHTML=`
    <div class="card" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">${score===100?'🎉':score>=90?'🔥':score>=70?'👍':'💪'}</div>
      <div style="font-size:36px;font-weight:800;color:${score>=90?'var(--green)':score>=70?'var(--gold)':'var(--accent)'};margin-bottom:8px">${score}점</div>
      <div style="font-size:15px;margin-bottom:16px">${quizState.correct}/${quizState.total} 정답</div>
      <div style="background:rgba(233,69,96,.1);border:1px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:20px;font-size:15px;line-height:1.6">
        ${praiseMsg}
      </div>
      ${quizState.wrong.length>0?`
        <h4 style="margin:16px 0 8px;text-align:left;color:var(--accent)">❌ 틀린 단어 (${quizState.wrong.length}개)</h4>
        <table>
          <tr><th>영어</th><th>정답</th><th>내 답</th></tr>
          ${quizState.wrong.map(w=>`
            <tr>
              <td style="font-weight:600">${w.question}</td>
              <td style="color:var(--green)">${w.answer}</td>
              <td style="color:var(--accent)">${w.selected}</td>
            </tr>
          `).join('')}
        </table>
      `:''}
      <button style="background:var(--accent);color:#fff;width:100%;padding:14px;font-size:16px;margin-top:16px" onclick="quizState=null;renderApp()">돌아가기</button>
    </div>`;
}

function renderWrongNote(el){
  const notes=lsGet('wrong_notes',[]);
  el.innerHTML=`
    <div class="card">
      <h3>📕 오답노트 (${notes.length}개)</h3>
      ${notes.length>0?`
        <div style="margin-bottom:12px">
          <button style="background:var(--accent);color:#fff;margin-right:8px" onclick="retryWrongNotes()">오답 재시험 🔄</button>
          <button style="background:#333;color:#fff" onclick="if(confirm('전체 삭제?')){lsSet('wrong_notes',[]);renderApp();}">전체 삭제</button>
        </div>
        <table>
          <tr><th>영어</th><th>한글</th><th>교재</th><th>강</th><th>날짜</th><th>삭제</th></tr>
          ${notes.map((n,i)=>`
            <tr>
              <td style="font-weight:600">${n.eng}</td>
              <td>${n.kor}</td>
              <td style="font-size:11px">${n.section||''}</td>
              <td style="font-size:11px">${n.lesson||''}</td>
              <td style="font-size:11px">${n.date||''}</td>
              <td><button style="background:var(--accent);color:#fff;font-size:11px;padding:2px 8px" onclick="delWrongNote(${i})">×</button></td>
            </tr>
          `).join('')}
        </table>
      `:'<div style="text-align:center;padding:20px;color:var(--dim)">틀린 단어가 없어요! 완벽! 🎉</div>'}
    </div>`;
}

function delWrongNote(i){
  const notes=lsGet('wrong_notes',[]);
  notes.splice(i,1);
  lsSet('wrong_notes',notes);
  renderApp();
}

function retryWrongNotes(){
  const notes=lsGet('wrong_notes',[]);
  if(notes.length===0)return alert('오답이 없어요!');
  
  const pool=notes.map(n=>({eng:n.eng,kor:n.kor,section:n.section||'',lesson:n.lesson||'',idx:0}));
  pool.sort(()=>Math.random()-0.5);
  
  const questions=pool.map(w=>{
    const correct=w.kor;
    const allKor=notes.map(n=>n.kor).filter(k=>k!==correct);
    allKor.sort(()=>Math.random()-0.5);
    const wrongs=allKor.slice(0,3);
    while(wrongs.length<3)wrongs.push('(보기없음)');
    const options=shuffle([correct,...wrongs]);
    return{question:w.eng,answer:correct,options,type:'eng2kor',word:w};
  });
  
  quizState={active:true,questions,current:0,correct:0,wrong:[],section:'오답노트',lessons:'재시험',type:'오답재시험',total:questions.length};
  renderApp();
}

        <input id="cwEng" placeholder="영어 단어">
        <input id="cwKor" placeholder="한글 뜻">
        <button style="background:var(--green);color:#fff" onclick="addCustomWord()">추가</button>
      </div>
      <div class="cw-row">
        <input id="cwEngAuto" placeholder="영어 단어 입력 후 자동검색">
        <button style="background:var(--blue);color:#fff" onclick="autoSearchWord()">자동 뜻 검색 🔍</button>
      </div>
      <div id="autoSearchResult" style="margin-bottom:12px"></div>
      
      ${words.length>0?`
        <div style="margin:12px 0;display:flex;gap:8px">
          <button style="background:var(--accent);color:#fff" onclick="startCustomQuiz()">나만의 단어 시험 📝</button>
        </div>
        <table>
          <tr><th>★</th><th>영어</th><th>한글</th><th>🔊</th><th>삭제</th></tr>
          ${words.map((w,i)=>`
            <tr>
              <td>${starHTML('myword',`mw_${i}`)}</td>
              <td style="font-weight:600">${w.eng}</td>
              <td>${w.kor}</td>
              <td><button style="background:transparent;color:var(--blue);font-size:16px;padding:2px 6px" onclick="speak('${w.eng.replace(/'/g,"\\'")}')">🔊</button></td>
              <td><button style="background:var(--accent);color:#fff;font-size:11px;padding:2px 8px" onclick="delCustomWord(${i})">×</button></td>
            </tr>
          `).join('')}
        </table>
      `:'<div style="text-align:center;padding:20px;color:var(--dim)">아직 추가한 단어가 없어요. 위에서 추가해보세요!</div>'}
    </div>`;
}

function addCustomWord(){
  const eng=document.getElementById('cwEng').value.trim();
  const kor=document.getElementById('cwKor').value.trim();
  if(!eng||!kor)return alert('영어와 한글 모두 입력하세요');
  const words=lsGet('my_words',[]);
  words.push({eng,kor,date:new Date().toISOString().slice(0,10)});
  lsSet('my_words',words);
  renderApp();
}

function delCustomWord(i){
  const words=lsGet('my_words',[]);
  words.splice(i,1);
  lsSet('my_words',words);
  renderApp();
}

async function autoSearchWord(){
  const eng=document.getElementById('cwEngAuto').value.trim();
  if(!eng)return alert('영어 단어를 입력하세요');
  
  const resultDiv=document.getElementById('autoSearchResult');
  resultDiv.innerHTML='<span style="color:var(--dim)">검색 중...</span>';
  
  // Search in all vocab data first
  let found=null;
  for(const section of Object.keys(ALL_VOCAB)){
    for(const lesson of Object.keys(ALL_VOCAB[section])){
      const match=ALL_VOCAB[section][lesson].find(w=>w[0].toLowerCase()===eng.toLowerCase());
      if(match){found=match;break;}
    }
    if(found)break;
  }
  
  if(found){
    resultDiv.innerHTML=`
      <div style="background:#0d1b2a;padding:10px;border-radius:8px;margin-top:8px">
        <span style="font-weight:700">${found[0]}</span> = <span style="color:var(--green)">${found[1]}</span>
        <button style="background:var(--green);color:#fff;margin-left:12px;font-size:12px;padding:4px 12px" onclick="addAutoWord('${found[0].replace(/'/g,"\\'")}','${found[1].replace(/'/g,"\\'")}')">추가하기</button>
      </div>`;
  }else{
    // Try dictionary API as fallback
    try{
      const resp=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${eng}`);
      if(resp.ok){
        const data=await resp.json();
        const meaning=data[0]?.meanings?.[0]?.definitions?.[0]?.definition||'뜻을 찾을 수 없음';
        resultDiv.innerHTML=`
          <div style="background:#0d1b2a;padding:10px;border-radius:8px;margin-top:8px">
            <span style="font-weight:700">${eng}</span> = <span style="color:var(--gold)">${meaning}</span>
            <div style="font-size:11px;color:var(--dim);margin-top:4px">※ 영영사전 결과입니다. 한글 뜻을 직접 수정 후 추가하세요</div>
            <input id="cwAutoKor" value="" placeholder="한글 뜻 직접 입력" style="margin-top:8px;width:70%">
            <button style="background:var(--green);color:#fff;margin-left:8px;font-size:12px;padding:4px 12px" onclick="addAutoWordManual('${eng.replace(/'/g,"\\'")}')">추가</button>
          </div>`;
      }else{
        resultDiv.innerHTML='<span style="color:var(--accent)">사전에서 찾을 수 없는 단어예요. 직접 입력해주세요!</span>';
      }
    }catch{
      resultDiv.innerHTML='<span style="color:var(--accent)">검색 실패. 직접 입력해주세요!</span>';
    }
  }
}

function addAutoWord(eng,kor){
  const words=lsGet('my_words',[]);
  words.push({eng,kor,date:new Date().toISOString().slice(0,10)});
  lsSet('my_words',words);
  renderApp();
}

function addAutoWordManual(eng){
  const kor=document.getElementById('cwAutoKor').value.trim();
  if(!kor)return alert('한글 뜻을 입력하세요');
  addAutoWord(eng,kor);
}

function startCustomQuiz(){
  const words=lsGet('my_words',[]);
  if(words.length<4)return alert('최소 4개 이상 단어가 필요합니다');
  
  const pool=[...words].sort(()=>Math.random()-0.5);
  const questions=pool.map(w=>{
    const correct=w.kor;
    const wrongs=words.filter(x=>x.kor!==correct).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.kor);
    while(wrongs.length<3)wrongs.push('(보기없음)');
    const options=shuffle([correct,...wrongs]);
    return{question:w.eng,answer:correct,options,type:'eng2kor',word:{eng:w.eng,kor:w.kor,section:'나만의단어장',lesson:''}};
  });
  
  quizState={active:true,questions,current:0,correct:0,wrong:[],section:'나만의단어장',lessons:'전체',type:'나만의단어',total:questions.length};
  renderApp();
}

// ========== GRADES ==========
function renderGrades(el){
  const scores=quizHistory.map(q=>q.score);
  const avg=scores.length>0?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  const max=scores.length>0?Math.max(...scores):0;
  const recent5=scores.slice(0,5);
  
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="card parent-stat"><div class="big-num" style="color:var(--blue)">${avg}</div><div class="label">평균</div></div>
      <div class="card parent-stat"><div class="big-num" style="color:var(--green)">${max}</div><div class="label">최고점</div></div>
      <div class="card parent-stat"><div class="big-num" style="color:var(--gold)">${quizHistory.length}</div><div class="label">시험횟수</div></div>
    </div>
    <div class="card">
      <h3>📊 시험 기록</h3>
      ${quizHistory.length>0?`
        <div style="display:flex;gap:4px;align-items:flex-end;height:120px;margin-bottom:16px;padding:0 4px">
          ${quizHistory.slice(0,20).reverse().map(q=>{
            const h=Math.max(q.score,5);
            const color=q.score>=90?'var(--green)':q.score>=70?'var(--gold)':'var(--accent)';
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <span style="font-size:10px;color:var(--dim)">${q.score}</span>
              <div style="width:100%;height:${h}%;background:${color};border-radius:4px 4px 0 0;min-height:4px"></div>
            </div>`;
          }).join('')}
        </div>
        <table>
          <tr><th>날짜</th><th>유형</th><th>범위</th><th>점수</th><th>정답</th></tr>
          ${quizHistory.map(q=>{
            const sc=q.score>=90?'high':q.score>=70?'mid':'low';
            return `<tr>
              <td style="font-size:12px">${(q.created_at||'').slice(0,10)}</td>
              <td>${q.quiz_type||''}</td>
              <td style="font-size:11px">${q.section||''} ${q.lesson||''}</td>
              <td><span class="score-badge ${sc}">${q.score}점</span></td>
              <td style="font-size:12px">${q.correct_count||0}/${q.total||0}</td>
            </tr>`;
          }).join('')}
        </table>
      `:'<div style="text-align:center;padding:20px;color:var(--dim)">아직 시험 기록이 없어요</div>'}
    </div>`;
}

"1강":[
{id:"26005-0001",title:"Gateway",type:"편지글",
text:`Dear students,\nI am Amanda Clark, the school club director, and I am writing to you about our school clubs. Over the last few semesters, there have been requests for more diverse school clubs. For this reason, the school decided to expand the number of clubs for extracurricular activities. This provides students with an opportunity to make additional clubs. Students can make any type of club based on their various interests, such as hip-hop, K-pop dancing, or coding. Therefore, I am encouraging you to submit a proposal for a new club that you would like to create. Please turn this in to my office by the end of this week. I look forward to seeing your great ideas.\nBest regards,\nAmanda Clark`,
translation:`학생 여러분께,\n저는 학교 동아리 담당자 아만다 클라크입니다. 저희 학교 동아리에 대해 편지를 드립니다. 지난 몇 학기 동안 더 다양한 학교 동아리에 대한 요청이 있었습니다. 이러한 이유로 학교는 과외 활동을 위한 동아리 수를 확장하기로 결정했습니다. 이것은 학생들에게 추가 동아리를 만들 기회를 제공합니다. 학생들은 힙합, K-pop 댄싱, 코딩과 같은 다양한 관심사를 바탕으로 어떤 유형의 동아리든 만들 수 있습니다. 따라서 여러분이 만들고 싶은 새로운 동아리에 대한 제안서를 제출하기를 권합니다. 이번 주 말까지 제 사무실에 제출해 주세요. 여러분의 훌륭한 아이디어를 기대하겠습니다.\nAmanda Clark 드림`,
analysis:`[주제] 학교 동아리 신설 제안서 제출 요청\n[구문] This provides students with an opportunity [to make additional clubs]. → to부정사가 opportunity를 수식\n[구문] Therefore, I am encouraging you [to submit a proposal for a new club {that you would like to create}]. → that절이 a new club 수식`,
answer:"3"},

{id:"26005-0002",title:"Exercise 01",type:"편지글",
text:`Dear Parents,\nAt Greenwood High School, we take great pride in the cultural diversity that enriches our community. We are very pleased to share with you our special new project, a recipe book, created to celebrate the traditions and flavors of families from around the world. This unique collection features 100 recipes from 26 countries, highlighting beloved dishes passed down through generations. It offers a special chance to explore global cuisine and share meaningful moments with your children. We encourage you to try some of these recipes together over the summer. You can download this online recipe book from our school website. Food brings us together, and this project reflects the joy and unity that diversity brings to our school. Thank you, as always, for your continued support.\nWarm regards,\nDr. Helen Brooks\nPrincipal, Greenwood High School`,
translation:`학부모님께,\nGreenwood 고등학교에서는 우리 공동체를 풍요롭게 하는 문화적 다양성을 매우 자랑스럽게 생각합니다. 전 세계 가족들의 전통과 맛을 기념하기 위해 만들어진 특별한 새 프로젝트인 레시피북을 여러분과 공유하게 되어 매우 기쁩니다. 이 독특한 컬렉션은 26개국의 100가지 레시피를 담고 있으며, 세대를 거쳐 전해 내려온 사랑받는 요리들을 부각시킵니다. 이것은 세계 요리를 탐험하고 자녀들과 의미 있는 시간을 나눌 특별한 기회를 제공합니다. 여름 동안 이러한 레시피들 중 일부를 함께 시도해 보시기를 권장합니다. 이 온라인 레시피북은 우리 학교 웹사이트에서 다운로드할 수 있습니다. 음식은 우리를 하나로 만들고, 이 프로젝트는 다양성이 우리 학교에 가져다주는 기쁨과 단합을 반영합니다. 언제나 그렇듯이 지속적인 지지에 감사드립니다.\nGreenwood 고등학교 교장 Helen Brooks 드림`,
analysis:`[주제] 학교의 다문화 레시피북 프로젝트 안내\n[구문] We are very pleased [to share with you our special new project, a recipe book, {created to celebrate the traditions and flavors of families from around the world}]. → created 이하 분사구문이 a recipe book 수식\n[구문] It offers a special chance [to explore global cuisine and share meaningful moments with your children]. → to부정사가 chance 수식`,
answer:"3"},

{id:"26005-0003",title:"Exercise 02",type:"편지글",
text:`Dear Professor Langford,\nFirst of all, we apologize for contacting you during the holiday season. We understand that this is a busy time, but as the revision deadline of your manuscript (December 27th) is quickly approaching, we kindly ask for your cooperation in addressing the reviewers' comments as thoroughly as possible within the limited time available. The reviewers have carefully evaluated your manuscript and provided insightful and critical feedback. To help you revise, we have summarized the key points raised by both reviewers. Please review these comments carefully and submit a revised version of your manuscript. We are confident that incorporating these suggestions will significantly improve the manuscript and provide stronger support for your main claims. We hope that the revised manuscript will satisfy the reviewers and be accepted in our journal. Thank you for your attention and cooperation.\nBest regards,\nNora Ellison, Associate Editor`,
translation:`Langford 교수님께,\n우선, 휴일 기간 중에 연락드려 죄송합니다. 이 시기가 바쁜 때라는 것을 이해하지만, 귀하의 원고 수정 마감일(12월 27일)이 빠르게 다가오고 있어서, 제한된 시간 내에서 심사자들의 의견을 가능한 한 철저히 다뤄주시기를 정중히 요청드립니다. 심사자들이 귀하의 원고를 신중히 평가하고 통찰력 있고 비판적인 피드백을 제공했습니다. 수정을 도와드리기 위해, 두 심사자가 제기한 핵심 사항들을 요약했습니다. 이러한 의견들을 신중히 검토하시고 원고의 수정된 버전을 제출해 주시기 바랍니다. 이러한 제안들을 반영하는 것이 원고를 크게 개선하고 주요 주장에 대한 더 강력한 뒷받침을 제공할 것이라고 확신합니다. 수정된 원고가 심사자들을 만족시키고 저희 저널에 게재될 것을 희망합니다. 관심과 협조에 감사드립니다.\n부편집장 Nora Ellison 드림`,
analysis:`[주제] 학술지 원고 수정 요청\n[구문] Please [review these comments carefully] and [submit a revised version of your manuscript]. → 명령문 and 병렬\n[구문] We hope [that the revised manuscript will {satisfy the reviewers} and {be accepted in our journal}]. → that절 내 and 병렬`,
answer:"5"},

{id:"26005-0004",title:"Exercise 03",type:"편지글",
text:`To whom it may concern,\nBefore I get to my main point, I'd like to mention a past experience with your store. A year ago, I ordered my wedding bouquet from you, and my husband, Nicholas, had promised me David Austin roses. However, on my wedding day, I received standard roses instead. Although I briefly considered filing a complaint about the mistake, I chose to focus on enjoying my special day. Yesterday, to celebrate our one-year wedding anniversary, my husband ordered David Austin roses from your store again. However, the flowers I received today were lifeless, spotted, and browning upon arrival. This time, I believe it's only fair to ask you to take action to resolve this matter. I am not asking for compensation for the flowers from a year ago, but I do expect a refund for this order. To resolve this issue, I would appreciate a full refund. I look forward to your response.\nSincerely,\nCheryl`,
translation:`관계자분께,\n본론에 들어가기 전에, 귀하의 가게와 관련된 과거 경험을 언급하고 싶습니다. 1년 전, 저는 귀하로부터 웨딩 부케를 주문했고, 제 남편 Nicholas는 저에게 David Austin 장미를 약속했습니다. 하지만 결혼식 날, 저는 대신 일반 장미를 받았습니다. 그 실수에 대해 불만을 제기하는 것을 잠시 고려했지만, 저는 특별한 날을 즐기는 데 집중하기로 선택했습니다. 어제, 우리의 1주년 결혼기념일을 축하하기 위해 제 남편은 귀하의 가게에서 다시 David Austin 장미를 주문했습니다. 하지만 오늘 제가 받은 꽃들은 생기가 없고, 반점이 있었으며, 도착했을 때 갈색으로 변하고 있었습니다. 이번에는 이 문제를 해결하기 위해 조치를 취해달라고 요청하는 것이 공정하다고 생각합니다. 저는 1년 전 꽃에 대한 보상을 요구하지는 않지만, 이번 주문에 대한 환불은 기대합니다. 이 문제를 해결하기 위해 전액 환불을 받고 싶습니다. 귀하의 답변을 기다리겠습니다.\nCheryl 드림`,
analysis:`[주제] 꽃 주문 불만 및 환불 요청\n[구문] However, the flowers [I received today] were lifeless, spotted, and browning upon arrival. → 관계대명사절이 the flowers 수식\n[구문] This time, I believe [it's only fair {to ask you to take action to resolve this matter}]. → it 가주어, to부정사 진주어`,
answer:"1"},

{id:"26005-0005",title:"Exercise 04",type:"편지글",
text:`Dear Mr. Johnson,\nHave you "settled into" your new job by now, and do you still feel as enthusiastic about it as you did at the beginning? Of course, any job has its tiresome tasks, but all in all, from what you told us, it sounds like a good match for you. We're writing to ask when we can expect repayment of the $1,500 loan for your car. We were glad to help you with the purchase of your car so that you'd have transportation back and forth to your new job. You agreed to pay all, or at least half, of the loan by June. If you have decided that you cannot repay the total $1,500 at once, we understand. But we do need to receive at least half that amount within the next 2 or 3 weeks. We hope you are satisfied with the car you chose. We, too, thought it was a good buy. Please let us know how things are going.\nSincerely,\nJoseph Brown\nFinancial Advisor`,
translation:`Johnson 씨께,\n지금쯤 새 직장에 적응했나요? 그리고 처음처럼 여전히 열정적인가요? 물론 어떤 직장이든 지루한 업무가 있지만, 전반적으로 당신이 말한 바로는 당신에게 잘 맞는 것 같습니다. 자동차 구입을 위한 1,500달러 대출금을 언제 상환받을 수 있을지 문의하고자 편지를 씁니다. 새 직장을 오가는 교통수단을 마련할 수 있도록 차 구입을 도와드릴 수 있어서 기뻤습니다. 당신은 6월까지 전액 또는 최소 절반을 갚겠다고 약속했습니다. 1,500달러 전액을 한 번에 갚을 수 없다고 결정했다면 이해합니다. 하지만 앞으로 2-3주 내에는 최소한 그 금액의 절반은 받아야 합니다. 당신이 선택한 차에 만족하기를 바랍니다. 우리도 좋은 구매였다고 생각했습니다. 어떻게 지내는지 알려주세요.\nJoseph Brown 재정고문 드림`,
analysis:`[주제] 자동차 대출금 상환 요청\n[구문] We're writing to ask [when we can expect repayment of the $1,500 loan for your car]. → 간접의문문\n[구문] We hope [you are satisfied with the car {you chose}]. → that 생략된 명사절, 관계대명사절이 the car 수식`,
answer:"2"}
],

"2강":[
{id:"26005-0006",title:"Gateway",type:"심경변화",
text:`"Where could it be?" Sophie asked herself. It had been more than ten years since she had last visited the area where she had grown up. The village had changed a lot over time. Uncertain, she awkwardly looked around at her surroundings. She walked the narrow streets of the village, unsure about which way to go. Suddenly, Sophie saw a familiar sight. "Yes, this must be it," she thought. In front of her was a wall with flowers painted on it. Although the colors were now faded, the familiar shapes on the wall were the same ones she had painted with her father as a child. Sophie nodded, smiled brightly, and walked toward the gate. At last, she had finally found the house she had grown up in.`,
translation:`"어디일까?" Sophie는 자문했다. 그녀가 자란 지역을 마지막으로 방문한 지 10년이 넘었다. 마을은 시간이 지나면서 많이 변했다. 불확실한 마음으로, 그녀는 어색하게 주위를 둘러보았다. 그녀는 어느 방향으로 가야 할지 확신하지 못한 채 마을의 좁은 거리를 걸었다. 갑자기, Sophie는 익숙한 광경을 보았다. "맞아, 여기임에 틀림없어,"라고 그녀는 생각했다. 그녀 앞에는 꽃이 그려진 벽이 있었다. 색은 바래져 있었지만, 벽에 있는 익숙한 모양들은 어린 시절 아버지와 함께 그렸던 것과 같았다. Sophie는 고개를 끄덕이고, 환하게 미소 지으며, 대문을 향해 걸어갔다. 마침내, 그녀는 자신이 자란 집을 찾았다.`,
analysis:`[주제] Sophie의 심경 변화: 불안/혼란 → 안도/기쁨\n[심경] confused → relieved\n[단서] Uncertain, awkwardly → familiar sight → smiled brightly, At last\n[구문] It had been more than ten years since she had last visited the area [where she had grown up]. → 과거완료+since+과거완료, where 관계부사`,
answer:"confused → relieved"},

{id:"26005-0007",title:"Exercise 01",type:"심경변화",
text:`It was the day I had been preparing for. I drove for an hour and a half to apply for a visa. My heart was racing, but I felt ready. That same day, I helped three people who didn't know English by translating for the immigration officer. Two of them were lucky to get their visas. Then I heard my name called. Believing things were going smoothly, I made my way to the counter. I showed my documents and property papers to prove that I would return home after visiting my children. Unfortunately, the officer, who had smiled when I was helping her, suddenly turned serious. She ignored my papers and put a red stamp on my application. I didn't have a chance to say a word. I felt as if a heavy rock was pressing down on my mind. I didn't expect to hear her words of rejection. I felt dizzy, and my eyes were full of tears. I couldn't see anything at that moment.`,
translation:`내가 준비해 왔던 날이었다. 비자를 신청하기 위해 한 시간 반을 운전했다. 심장이 뛰었지만 준비가 됐다고 느꼈다. 같은 날, 영어를 모르는 세 사람을 위해 출입국 심사관에게 통역을 해주었다. 그 중 두 명은 운 좋게 비자를 받았다. 그때 내 이름이 불리는 것을 들었다. 일이 순조롭게 진행되고 있다고 믿으며 카운터로 향했다. 아이들을 방문한 후 귀국할 것임을 증명하기 위해 서류와 재산 증빙을 보여주었다. 불행히도, 내가 도와줄 때 미소 짓던 심사관이 갑자기 진지해졌다. 그녀는 내 서류를 무시하고 신청서에 빨간 도장을 찍었다. 한마디도 할 기회가 없었다. 마치 무거운 바위가 마음을 짓누르는 것 같았다. 거절의 말을 들을 줄 예상하지 못했다. 어지러웠고, 눈에 눈물이 가득했다. 그 순간 아무것도 볼 수 없었다.`,
analysis:`[주제] 비자 신청의 기대감에서 거절 후 절망으로의 심경 변화\n[심경] hopeful → disheartened\n[단서] felt ready, going smoothly → suddenly turned serious, red stamp, rejection, tears`,
answer:"hopeful → disheartened"},

{id:"26005-0008",title:"Exercise 02",type:"심경변화",
text:`After a few nights, we ventured out on a hike to 16,000 feet. The group members were all experienced, so I couldn't understand why they were climbing so slowly -- what I thought was a ridiculous pace. Having trained hard for this, I was in the best shape of my life. And, being the rookie, I wanted to prove myself to the group. Why not show off my superior conditioning? So up front I went. Then, as we approached 16,000 feet, I suddenly began to feel dizzy. Not long after, I was staggering. The group had to take my pack. In a matter of minutes, I became a basket case, needing assistance just to walk. On the way down to the hut, I could barely keep in a straight line because of the nausea, headache, and dizziness. Now all I felt was guilt for becoming a burden to the group. I wished I hadn't pushed myself so hard.`,
translation:`며칠 밤이 지난 후, 우리는 16,000피트까지 하이킹을 나섰다. 그룹 멤버들은 모두 경험이 많았기에, 왜 그렇게 천천히 올라가는지 이해할 수 없었다 — 내가 보기에 우스꽝스러운 속도였다. 이를 위해 열심히 훈련했기에 인생 최고의 체력이었다. 그리고 초보자로서 그룹에 나 자신을 증명하고 싶었다. 뛰어난 체력을 뽐내보는 게 어때? 그래서 앞장서서 갔다. 그런데 16,000피트에 가까워지자 갑자기 어지러워지기 시작했다. 얼마 지나지 않아 비틀거리고 있었다. 그룹이 내 배낭을 맡아야 했다. 몇 분 만에 완전히 녹초가 되어 걷기만 해도 도움이 필요했다. 오두막으로 내려가는 길에 메스꺼움, 두통, 어지러움 때문에 거의 직선으로 걸을 수 없었다. 이제 느끼는 것은 그룹에 짐이 된 것에 대한 죄책감뿐이었다. 그렇게 무리하지 않았더라면 좋았을 텐데.`,
analysis:`[주제] 자신감에서 좌절과 죄책감으로의 심경 변화\n[심경] confident → regretful\n[단서] best shape, prove myself → staggering, basket case, guilt, wished I hadn't`,
answer:"confident → regretful"}
],

"3강":[
{id:"26005-0011",title:"Gateway",type:"빈칸추론",
text:`Digital platforms have made a lot of work less sticky. As work becomes ever more modularised, commoditised and standardised, and as markets for digital work are created, ties between service work and particular places can be disconnected. While the business process of outsourcing that emerged in the 1990s allowed large companies to take advantage of a 'global reserve army' by moving their call centres to cheap and distant labour markets, cloudwork changes the volume and granularity at which geographically non-proximate work can take place. A small business in New York can hire a freelance transcriber in Nairobi one day and New Delhi the next. No offices or factories need to be built, no local regulations are observed, and -- in most cases -- no local taxes are paid. The switch in the production network of work happens by simply sending some emails or clicking some buttons on a digital work platform. And, in this way, the employer leaves behind no material traces in the places where it was once an employer.`,
translation:`디지털 플랫폼은 많은 일을 덜 고정적으로 만들었다. 일이 점점 더 모듈화되고, 상품화되고, 표준화되며, 디지털 작업 시장이 만들어지면서, 서비스 작업과 특정 장소 사이의 유대가 끊어질 수 있다. 1990년대에 등장한 아웃소싱 사업 과정은 대기업들이 콜센터를 값싸고 먼 노동 시장으로 옮겨 '글로벌 예비군'을 활용할 수 있게 했지만, 클라우드워크는 지리적으로 가깝지 않은 작업이 이루어질 수 있는 규모와 세밀함을 바꾼다. 뉴욕의 소기업이 하루는 나이로비의 프리랜서 필사자를 고용하고, 다음 날은 뉴델리의 필사자를 고용할 수 있다. 사무실이나 공장을 지을 필요가 없고, 현지 규정도 준수하지 않으며, 대부분의 경우 현지 세금도 내지 않는다. 작업의 생산 네트워크 전환은 디지털 작업 플랫폼에서 몇 통의 이메일을 보내거나 몇 개의 버튼을 클릭하는 것으로 일어난다. 이런 식으로, 고용주는 한때 고용주였던 장소에 어떤 물질적 흔적도 남기지 않는다.`,
analysis:`[주제] 디지털 플랫폼이 업무의 공간적 유연성을 높였다\n[빈칸 위치] made a lot of work less sticky\n[정답] ② elevated the spatial flexibility in conducting business\n[핵심] 디지털 플랫폼 → 작업과 장소의 유대 해체 → 공간적 유연성 증가`,
answer:"2"},

{id:"26005-0012",title:"Exercise 01",type:"빈칸추론",
text:`Even outdoors, although climate (including temperature) is usually regarded as beyond the control of man, localized temperature control is sometimes effective on a microclimate scale. Vancouver, Canada, is a few miles north of the 49th parallel, about 60 miles farther north than Minot, North Dakota, with its legendary harsh winter temperatures. But constant foehn winds off the Pacific Ocean make Vancouver winters mild and wet, although sunshine is scant. When I had a garden there in the late 1940s, a neighbor used to say that I "cheated God" to bring in my lettuce and tomatoes earlier than anyone else. The bed in which the vegetables grew was banked toward the south at approximately 50 degrees, and the area between the plants was covered with flat stones, gathered from the nearby beach, to maximize soil heating from the weak late winter-early spring sun.`,
translation:`야외에서도, 기후(온도 포함)는 보통 사람이 통제할 수 없다고 여겨지지만, 국지적 온도 조절은 때때로 미기후 규모에서 효과적이다. 캐나다 밴쿠버는 49도선 북쪽 몇 마일에 위치하며, 전설적으로 혹독한 겨울 온도를 가진 노스다코타 마이넛보다 약 60마일 더 북쪽이다. 하지만 태평양에서 불어오는 지속적인 푄 바람이 밴쿠버의 겨울을 온화하고 습하게 만들지만, 햇빛은 부족하다. 1940년대 후반 그곳에 정원이 있었을 때, 이웃은 내가 다른 누구보다 일찍 상추와 토마토를 수확해서 "신을 속였다"고 말하곤 했다. 채소가 자라는 화단은 남쪽으로 약 50도 기울어져 있었고, 식물 사이의 공간은 근처 해변에서 모은 납작한 돌로 덮여 있었는데, 이는 약한 늦겨울-이른 봄 태양으로부터의 토양 가열을 극대화하기 위해서였다.`,
analysis:`[주제] 전략적 정원 기법을 통한 미기후 활용\n[정답] ⑤ made a warmer microclimate using strategic gardening methods\n[핵심] 화단 각도 + 돌 배치 → 토양 가열 극대화 → 미기후 조절`,
answer:"5"},

{id:"26005-0013",title:"Exercise 02",type:"빈칸추론",
text:`Energy can always be injected into an organization to motivate people to do things. Bonuses, promotions, other carrots, and even a few sticks can get people to work harder, for sure, but the gains are, like all manipulations, short-term. Over time, such tactics cost more money and increase stress for employee and employer alike, and eventually will become the main reason people show up for work every day. That's not loyalty. That's the employee version of repeat business. Loyalty among employees is when they turn down more money or benefits to continue working at the same company. Loyalty to a company trumps pay and benefits. And unless you're an astronaut, it's not the work we do that inspires us either. It's the cause that we come to work for. We don't want to come to work to build a wall; we want to come to work to build a cathedral.`,
translation:`에너지는 항상 조직에 주입되어 사람들에게 동기를 부여할 수 있다. 보너스, 승진, 기타 당근, 그리고 몇 가지 채찍까지도 사람들을 더 열심히 일하게 할 수 있지만, 그 성과는 모든 조작과 마찬가지로 단기적이다. 시간이 지나면 그러한 전략은 더 많은 비용이 들고 직원과 고용주 모두에게 스트레스를 증가시키며, 결국 사람들이 매일 출근하는 주된 이유가 된다. 그것은 충성이 아니다. 그것은 반복 거래의 직원 버전이다. 직원들 사이의 충성은 같은 회사에서 계속 일하기 위해 더 많은 돈이나 혜택을 거절하는 것이다. 회사에 대한 충성은 급여와 혜택을 넘어선다. 우주비행사가 아닌 한, 우리에게 영감을 주는 것은 우리가 하는 일 자체가 아니다. 우리가 일하러 오는 대의이다. 우리는 벽을 쌓으러 출근하고 싶지 않다; 우리는 대성당을 지으러 출근하고 싶다.`,
analysis:`[주제] 진정한 동기부여는 더 높은 목적/대의에서 온다\n[빈칸] build a cathedral의 의미\n[정답] ④ work towards a higher purpose or meaningful cause\n[핵심] 당근과 채찍 = 단기적 → 충성 = 대의(cause) → 대성당(cathedral) = 의미 있는 목적`,
answer:"4"}
],

"4강":[
{id:"26005-0016",title:"Gateway",type:"주제/요지",
text:`A sport ecosystem exists based on the type and rate of coopetition existing. Coopetition is defined as "the simultaneous pursuit of cooperation and competition among firms to leverage strategically important resources for superior value creation purposes". It is a useful way to understand the dynamic nature of sport businesses which need to collaborate for resource efficiency purposes but potentially compete with each other. This special relationship should be managed properly due to trust and confidence issues being paramount. It can be challenging to be collaborative and competitive in sport as they involve different forms of behaviour. This means a careful balancing act may be required in terms of the amount of emphasis placed on each activity. Often sport managers will try to be more competitive due to performance reasons and less collaborative. By necessity they may need to share information but do so in a cautious manner. This means it might be better to have plans in place about how to pursue both simultaneously. This will ensure one is not neglected at the expense of the other.`,
translation:`스포츠 생태계는 존재하는 협력적 경쟁의 유형과 비율에 기반하여 존재한다. 협력적 경쟁은 "우수한 가치 창출 목적을 위해 전략적으로 중요한 자원을 활용하기 위한 기업 간 협력과 경쟁의 동시 추구"로 정의된다. 이것은 자원 효율성을 위해 협력해야 하지만 잠재적으로 서로 경쟁하는 스포츠 사업의 역동적 특성을 이해하는 유용한 방법이다. 이 특별한 관계는 신뢰와 확신 문제가 가장 중요하기 때문에 적절히 관리되어야 한다. 스포츠에서 협력적이면서 경쟁적이기는 다른 형태의 행동을 포함하기 때문에 어려울 수 있다. 이는 각 활동에 두는 강조의 정도에서 신중한 균형 잡기가 필요할 수 있음을 의미한다. 흔히 스포츠 매니저들은 성과 이유로 더 경쟁적이고 덜 협력적이려 한다. 필요에 의해 정보를 공유해야 하지만 신중한 방식으로 그렇게 한다. 이는 둘 다 동시에 추구하는 방법에 대한 계획을 갖추는 것이 더 나을 수 있음을 의미한다. 이것이 하나가 다른 하나의 희생으로 소홀히 되지 않도록 보장할 것이다.`,
analysis:`[주제] 스포츠 비즈니스에서 협력과 경쟁의 균형 관리\n[요지] 스포츠 기업은 협력과 경쟁을 동시에 추구하되, 한쪽이 다른 쪽의 희생으로 소홀해지지 않도록 균형을 유지해야 한다`,
answer:"스포츠 비즈니스에서 협력과 경쟁의 균형 관리"}
],

"5강":[
{id:"26005-0021",title:"Gateway",type:"주장/요지",
text:`The study of literature has repeatedly failed to recognize the influence of modern musical lyricists and their contributions to the evolution of language. Unlike Shakespeare, who has been studied and celebrated for his development of the English language, particularly in vocabulary and grammatical structure, modern songwriters have experienced restraints on the acknowledgement of their contributions and largely been ignored. Over the past century, we have witnessed an explosion of incredible literary works by these artists, who, through their music, have used linguistic manipulation and storytelling to enrich our language and literature. Producing lyrics of distinct and complex imagery, songwriters have had an incredible literary impact on our language. Their remarkable works, including influences on modern language development, must be recognized in the field of modern literature.`,
translation:`문학 연구는 현대 음악 작사가들의 영향력과 언어 진화에 대한 그들의 기여를 인식하는 데 반복적으로 실패해 왔다. 특히 어휘와 문법 구조에서의 영어 발전으로 연구되고 기념되어 온 셰익스피어와 달리, 현대 작곡가들은 기여에 대한 인정에 제약을 받아왔고 대부분 무시되어 왔다. 지난 세기에 걸쳐, 우리는 음악을 통해 언어적 조작과 이야기를 사용하여 우리의 언어와 문학을 풍요롭게 한 이 예술가들의 놀라운 문학 작품의 폭발적 증가를 목격했다. 독특하고 복잡한 심상의 가사를 만들며, 작곡가들은 우리 언어에 놀라운 문학적 영향을 미쳤다. 현대 언어 발전에 대한 영향을 포함하여, 그들의 주목할 만한 작품들은 현대 문학 분야에서 인정받아야 한다.`,
analysis:`[주제] 현대 작사가들의 문학적 기여를 인정해야 한다\n[요지] 셰익스피어처럼 연구되는 것과 달리, 현대 음악 작사가들의 언어·문학적 기여가 무시되어 왔으므로 인정받아야 한다`,
answer:"현대 작사가들의 문학적 기여 인정 필요"}
],

"6강":[
{id:"26005-0026",title:"Gateway",type:"주제",
text:`Emphasizing speed over frequency can make sense in contexts where everyone is expected to plan around the timetable, including peak-only commute services and very long trips with low demand. In all other contexts, though, it seems to be a common motorist's error. Roads are there all the time, so their speed is the most important fact that distinguishes them. But transit is only there if it's coming soon. If you have a car, you can use a road whenever you want and experience its speed. But transit has to exist when you need it (span), and it needs to be coming soon (frequency). Otherwise, waiting time will wipe out any time savings from a faster service. Unless you're comfortable planning your life around a particular scheduled trip, speed is worthless without frequency, so a transit map that screams about speed and whispers about frequency may simply be planting confusion.`,
translation:`빈도보다 속도를 강조하는 것은 출퇴근 전용 서비스와 수요가 적은 매우 긴 여행을 포함하여, 모두가 시간표에 맞춰 계획할 것으로 기대되는 맥락에서는 타당할 수 있다. 그러나 다른 모든 맥락에서는 이것은 흔한 운전자의 오류인 것 같다. 도로는 항상 거기에 있으므로, 속도가 도로를 구별하는 가장 중요한 사실이다. 하지만 대중교통은 곧 올 때만 거기에 있다. 자동차가 있으면, 원할 때마다 도로를 이용하고 속도를 경험할 수 있다. 하지만 대중교통은 필요할 때 존재해야 하고(범위), 곧 와야 한다(빈도). 그렇지 않으면, 대기 시간이 더 빠른 서비스로 인한 시간 절약을 상쇄할 것이다. 특정 예정된 여행에 맞춰 생활을 계획하는 것이 편하지 않다면, 빈도 없는 속도는 가치가 없다. 따라서 속도에 대해 외치고 빈도에 대해 속삭이는 대중교통 지도는 단순히 혼란을 심는 것일 수 있다.`,
analysis:`[주제] 대중교통에서 빈도(frequency)의 중요성\n[핵심] 도로 = 항상 존재 → 속도가 중요 / 대중교통 = 올 때만 존재 → 빈도가 핵심\n[정답] ③ importance of valuing frequency in public transportation`,
answer:"3"}
]
};

// ========== 본문 학습 렌더링 ==========
function renderPassage(el){
  const savedSection=lsGet('ps_section','수특영어');
  const savedLesson=lsGet('ps_lesson','1강');
  const filter=lsGet('ps_filter','all'); // all, starred
  
  const sections={'수특영어':PASSAGES_ENG};
  const sectionKeys=Object.keys(sections);
  const data=sections[savedSection]||{};
  const lessons=Object.keys(data);
  const passages=data[savedLesson]||[];
  
  let filtered=passages;
  if(filter==='starred')filtered=passages.filter(p=>isStarred('passage',p.id));
  
  // Show/hide state
  const showStates=lsGet('ps_show',{});
  
  el.innerHTML=`
    <div class="card">
      <h3>📄 본문 학습</h3>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="psSection" onchange="changePSSection(this.value)">
          ${sectionKeys.map(s=>`<option ${s===savedSection?'selected':''}>${s}</option>`).join('')}
        </select>
        <select id="psLesson" onchange="changePSLesson(this.value)">
          ${lessons.map(l=>`<option ${l===savedLesson?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="filter-bar">
        <button class="${filter==='all'?'active':''}" onclick="setPSFilter('all')">전체 (${passages.length})</button>
        <button class="${filter==='starred'?'active':''}" onclick="setPSFilter('starred')">★ 별표만</button>
      </div>
    </div>
    
    ${filtered.length>0?filtered.map(p=>{
      const starred=isStarred('passage',p.id);
      const showTrans=showStates[p.id+'_t'];
      const showAnal=showStates[p.id+'_a'];
      return `
      <div class="passage-card ${starred?'starred':''}">
        <div class="passage-star">${starHTML('passage',p.id)}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <span style="background:var(--accent2);padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700">${p.type}</span>
          <span style="font-weight:700;font-size:15px">${savedLesson} - ${p.title}</span>
          <span style="font-size:11px;color:var(--dim)">${p.id}</span>
        </div>
        
        <div style="font-size:14px;line-height:1.8;white-space:pre-line;margin-bottom:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:8px">${p.text}</div>
        
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <button style="background:${showTrans?'var(--green)':'#333'};color:#fff;font-size:13px" onclick="togglePSShow('${p.id}_t')">
            ${showTrans?'해석 숨기기':'해석 보기'} 📖
          </button>
          <button style="background:${showAnal?'var(--blue)':'#333'};color:#fff;font-size:13px" onclick="togglePSShow('${p.id}_a')">
            ${showAnal?'분석 숨기기':'분석 보기'} 🔍
          </button>
          <button style="background:transparent;color:var(--blue);font-size:13px" onclick="speak(\`${p.text.replace(/`/g,"'").replace(/\n/g,' ').slice(0,200)}\`)">
            🔊 듣기
          </button>
        </div>
        
        ${showTrans?`<div style="background:rgba(39,174,96,.08);border:1px solid var(--green);border-radius:8px;padding:12px;margin-bottom:8px;font-size:14px;line-height:1.8;white-space:pre-line">${p.translation}</div>`:''}
        
        ${showAnal?`<div style="background:rgba(52,152,219,.08);border:1px solid var(--blue);border-radius:8px;padding:12px;font-size:13px;line-height:1.8;white-space:pre-line">${p.analysis}</div>`:''}
      </div>`;
    }).join(''):`<div class="card" style="text-align:center;color:var(--dim)">해당 조건에 맞는 본문이 없습니다</div>`}
  `;
}

function changePSSection(v){lsSet('ps_section',v);lsSet('ps_lesson',Object.keys(v==='수특영어'?PASSAGES_ENG:{})[0]||'1강');renderApp();}
function changePSLesson(v){lsSet('ps_lesson',v);renderApp();}
function setPSFilter(v){lsSet('ps_filter',v);renderApp();}

function togglePSShow(key){
  const s=lsGet('ps_show',{});
  s[key]=!s[key];
  lsSet('ps_show',s);
  renderApp();
}

window.addEventListener('beforeunload',function(e){
  if(role==='student'){
    e.preventDefault();
    e.returnValue='';
  }
});

// ========== 키보드 단축키 ==========
document.addEventListener('keydown',function(e){
  // ESC로 모달 닫기
  if(e.key==='Escape'){
    const modal=document.getElementById('pwModal');
    if(modal)modal.remove();
    const leave=document.getElementById('leaveOverlay');
    if(leave)leave.remove();
  }
});
