.hide{display:none!important}

.role-btn{padding:18px 36px;border:2px solid var(--border);background:var(--card);color:var(--text);border-radius:16px;font-size:1.15rem;cursor:pointer;transition:.2s;min-width:260px;text-align:center}
.role-btn:hover{border-color:var(--accent);background:var(--card2);transform:translateY(-2px)}

#pwModal input{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1rem;margin:12px 0;width:100%}
#pwModal button{padding:10px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem}
#pwModal .err{color:var(--red);font-size:.8rem;margin-top:4px}
header{background:var(--card);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}
header h2{font-size:1.05rem}
.dday{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:4px 14px;border-radius:20px;font-size:.85rem;font-weight:700}
.role-badge{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:600}
.role-badge.teacher{background:var(--accent)}
.role-badge.student{background:var(--green)}
.role-badge.parent{background:var(--accent2)}
.welcome-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;text-align:center;font-size:.9rem;color:var(--yellow);line-height:1.5}
.tabs{display:flex;gap:4px;padding:8px 12px;background:var(--card);overflow-x:auto;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.83rem;white-space:nowrap;background:transparent;border:none;color:var(--text2);transition:.2s}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){background:var(--card2)}
main{max-width:960px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card h3{margin-bottom:10px;font-size:1rem;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.stat{text-align:center;padding:16px 8px;background:var(--card2);border-radius:10px}
.stat .num{font-size:1.7rem;font-weight:700;color:var(--accent)}
.stat .num.green{color:var(--green)}
.stat .num.red{color:var(--red)}
.stat .num.yellow{color:var(--yellow)}
.stat .label{font-size:.78rem;color:var(--text2);margin-top:4px}
input,select,textarea{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.9rem;width:100%}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.85}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{opacity:.85}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{opacity:.85}
.btn-y{background:var(--yellow);color:#000}.btn-y:hover{opacity:.85}
.btn-o{background:var(--orange);color:#fff}.btn-o:hover{opacity:.85}
.btn-s{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--border)}
.btn-sm{padding:4px 10px;font-size:.75rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:600;font-size:.8rem}
tr.known{opacity:.35}
.star{cursor:pointer;font-size:1.1rem;user-select:none}
.star.on{color:var(--yellow)}
.play-btn{cursor:pointer;font-size:1rem;background:none;border:none;color:var(--accent);padding:2px}
.play-btn:hover{color:var(--green)}
.quiz-box{background:var(--card2);border-radius:12px;padding:24px;text-align:center;margin:12px 0}
.quiz-box .qnum{color:var(--text2);font-size:.8rem;margin-bottom:4px}
.quiz-box .q{font-size:1.5rem;margin:12px 0;font-weight:700}

.quiz-result{padding:10px 16px;border-radius:8px;margin:6px 0;font-weight:600;font-size:.9rem}
.quiz-result.correct{background:#166534;color:#86efac}
.quiz-result.wrong{background:#7f1d1d;color:#fca5a5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-done{background:#166534;color:#86efac}
.badge-overdue{background:#7f1d1d;color:#fca5a5}
.badge-pending{background:#854d0e;color:#fde047}
.badge-eng{background:#1e3a5f;color:#93c5fd}
.badge-kor{background:#3b1f5e;color:#c4b5fd}
.badge-math{background:#1a3d2e;color:#86efac}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mt{margin-top:12px}.mb{margin-bottom:12px}
.full{width:100%}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.blue{background:var(--accent)}
.progress-fill.red{background:var(--red)}
.msg-pop{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;font-size:.95rem;z-index:9999;animation:popIn .3s ease}
.msg-pop.praise{background:linear-gradient(135deg,#f59e0b,#ef4444);font-size:1.05rem}
.msg-pop.bye{background:linear-gradient(135deg,var(--accent),var(--accent2))}

.zoom-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600;transition:.2s}
.zoom-link:hover{background:#1d4ed8}
.chart-bar{display:flex;align-items:end;gap:3px;height:120px;padding-top:8px}
.chart-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px}

</style>
</head>

// ============================================================

// ============================================================
function getDday(){
const t=new Date();t.setHours(0,0,0,0);
const s=new Date(SUNUNG);s.setHours(0,0,0,0);
return Math.ceil((s-t)/(1000*60*60*24));
}

function todayStr(){return new Date().toISOString().slice(0,10)}
function getQuoteOfDay(){
const d=Math.floor((Date.now()/86400000))%QUOTES.length;
return QUOTES[d];
}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

function showPop(msg,cls='',dur=3000){
const d=document.createElement('div');
d.className='msg-pop'+(cls?' '+cls:'');
d.textContent=msg;
document.body.appendChild(d);
setTimeout(()=>d.remove(),dur);
}
function showPraise(pct){
let tier='low';
if(pct===100)tier='perfect';
else if(pct>=90)tier='high';
else if(pct>=70)tier='good';
else if(pct>=50)tier='okay';
showPop(rand(PRAISE[tier]),'praise',4000);
}

// ============================================================
//  Supabase DB helpers
// ============================================================
async function dbGet(table){
if(!sb)return[];
const{data,error}=await sb.from(table).select('*').order('created_at',{ascending:false});
return data||[];
}
async function dbInsert(table,row){
if(!sb)return null;
const{data,error}=await sb.from(table).insert(row).select();
return data?data[0]:null;
}
async function dbUpdate(table,id,obj){
if(!sb)return;
await sb.from(table).update(obj).eq('id',id);
}
async function dbDelete(table,id){
if(!sb)return;
await sb.from(table).delete().eq('id',id);
}
async function loadAll(){
cache.schedules=await dbGet('schedules');
cache.homework=await dbGet('homework');
cache.passages=await dbGet('passages');
cache.quiz_history=await dbGet('quiz_history');
cache.custom_words=await dbGet('custom_words');
}

// ============================================================
//  수업일정 자동 생성 (금22시, 일10시 ~ 수능일)
// ============================================================
function generateSchedules(){
const scheds=[];
const start=new Date();start.setHours(0,0,0,0);
const end=new Date(SUNUNG);
let d=new Date(start);
while(d<=end){
const dow=d.getDay();
if(dow===5){// 금요일
scheds.push({date:d.toISOString().slice(0,10),time:'22:00~23:00',title:'영어 과외',memo:'금요일 정규수업'});
}
if(dow===0){// 일요일
scheds.push({date:d.toISOString().slice(0,10),time:'10:00~12:00',title:'영어 과외',memo:'일요일 정규수업'});
}
d.setDate(d.getDate()+1);
}
return scheds;
}

async function addSchedule(){

async function toggleHw(id,done){
await dbUpdate('homework',id,{done});
cache.homework=await dbGet('homework');
renderTab('homework');
if(done) showPop('숙제 완료! 잘했어! 👏');
}

async function delHw(id){
if(!confirm('이 숙제를 삭제할까요?'))return;
await dbDelete('homework',id);
cache.homework=await dbGet('homework');
renderTab('homework');
}

// ============================================================
//  발음 재생 (Web Speech API)
// ============================================================
function speak(text,lang='en-US'){
if(!window.speechSynthesis)return;
window.speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang=lang;u.rate=0.85;
window.speechSynthesis.speak(u);
}

function speakAll(words,idx=0){
if(idx>=words.length)return;
speak(words[idx]);
setTimeout(()=>speakAll(words,idx+1),2000);
}

// 전체 단어 세트 합치기
const ALL_VOCAB={"수특 영어":VD_ENG,"수특 영독":VD_READ,"수특 듣기":VD_LISTEN};

// 로컬 체크/별표 저장
function vocabKey(book,lesson,eng){return `v_${book}_${lesson}_${eng}`}
function getVocabState(book,lesson,eng){
try{return JSON.parse(localStorage.getItem(vocabKey(book,lesson,eng)))||{known:false,starred:false}}
catch(e){return{known:false,starred:false}}
}
function setVocabState(book,lesson,eng,state){
localStorage.setItem(vocabKey(book,lesson,eng),JSON.stringify(state));
}

//  📖 단어학습 탭
// ============================================================
let vocabBook='수특 영어';
let vocabLesson='';
let vocabFilter='all'; // all, unknown, starred

function renderVocab(el){
const books=Object.keys(ALL_VOCAB);
const lessons=vocabBook?Object.keys(ALL_VOCAB[vocabBook]):[];
if(!vocabLesson&&lessons.length)vocabLesson=lessons[0];

let html=`<div class="card"><h3>📖 단어 학습</h3>
<div class="flex mb">
<select id="vBook" onchange="vocabBook=this.value;vocabLesson='';vocabFilter='all';renderTab('vocab')" style="max-width:160px">
${books.map(b=>`<option${b===vocabBook?' selected':''}>${b}</option>`).join('')}
</select>
<select id="vLesson" onchange="vocabLesson=this.value;renderTab('vocab')" style="max-width:200px">
${lessons.map(l=>`<option${l===vocabLesson?' selected':''}>${l}</option>`).join('')}
</select>
</div>
<div class="flex mb">
<button class="btn btn-sm ${vocabFilter==='all'?'btn-p':'btn-s'}" onclick="vocabFilter='all';renderTab('vocab')">전체</button>
<button class="btn btn-sm ${vocabFilter==='unknown'?'btn-o':'btn-s'}" onclick="vocabFilter='unknown';renderTab('vocab')">모르는 것만</button>
<button class="btn btn-sm ${vocabFilter==='starred'?'btn-y':'btn-s'}" onclick="vocabFilter='starred';renderTab('vocab')">⭐ 별표만</button>
<button class="btn btn-sm btn-g" onclick="speakAllVocab()">🔊 전체 듣기</button>
</div>
</div>`;

if(vocabLesson&&ALL_VOCAB[vocabBook]&&ALL_VOCAB[vocabBook][vocabLesson]){
let words=ALL_VOCAB[vocabBook][vocabLesson];
let filtered=words.map((w,i)=>{
const st=getVocabState(vocabBook,vocabLesson,w[0]);
return{eng:w[0],kor:w[1],known:st.known,starred:st.starred,idx:i};
});
if(vocabFilter==='unknown')filtered=filtered.filter(w=>!w.known);
if(vocabFilter==='starred')filtered=filtered.filter(w=>w.starred);

html+=`<div class="card"><h3>${vocabLesson} (${filtered.length}개)</h3>
<table><tr><th style="width:30px">#</th><th>🔊</th><th>영어</th><th>뜻</th><th>알아요</th><th>⭐</th></tr>`;
filtered.forEach((w,i)=>{
html+=`<tr class="${w.known?'known':''}">
<td style="color:var(--text2)">${i+1}</td>
<td><button class="play-btn" onclick="speak('${w.eng.replace(/'/g,"\\'")}')">🔊</button></td>
<td style="font-weight:600">${w.eng}</td>
<td>${w.kor}</td>
<td><span class="star${w.known?' on':''}" onclick="toggleVocabKnown('${w.eng.replace(/'/g,"\\'")}',${!w.known})">${w.known?'✅':'⬜'}</span></td>
<td><span class="star${w.starred?' on':''}" onclick="toggleVocabStar('${w.eng.replace(/'/g,"\\'")}',${!w.starred})">⭐</span></td>
</tr>`;
});

function toggleVocabKnown(eng,val){
const st=getVocabState(vocabBook,vocabLesson,eng);
st.known=val;setVocabState(vocabBook,vocabLesson,eng,st);
renderTab('vocab');
}
function toggleVocabStar(eng,val){
const st=getVocabState(vocabBook,vocabLesson,eng);
st.starred=val;setVocabState(vocabBook,vocabLesson,eng,st);
renderTab('vocab');
}
function speakAllVocab(){
if(!vocabLesson||!ALL_VOCAB[vocabBook]||!ALL_VOCAB[vocabBook][vocabLesson])return;
const words=ALL_VOCAB[vocabBook][vocabLesson].map(w=>w[0]);
speakAll(words);
showPop('🔊 전체 듣기 시작!');
}

// ============================================================
//  ✏️ 단어시험 탭
// ============================================================
let quizState=null; // {words,current,correct,wrongs,mode,setName,total}

function renderVocabTest(el){
if(quizState) return renderQuizActive(el);

const books=Object.keys(ALL_VOCAB);
let html=`<div class="card"><h3>✏️ 단어 시험</h3>
<div class="grid2 mb">
<div><label style="font-size:.8rem;color:var(--text2)">교재</label>
<select id="qtBook">${books.map(b=>`<option>${b}</option>`).join('')}</select></div>

<select id="qtLesson"></select></div>
</div>

<option value="ko2en">한글→영어</option>

</select></div>
</div>
<button class="btn btn-p full" onclick="startQuiz()">시험 시작! 🚀</button>
</div>`;

html+=`<script>
document.getElementById('qtBook').onchange=function(){
const b=this.value;const sel=document.getElementById('qtLesson');
const obj=b==='수특 영어'?VD_ENG:b==='수특 영독'?VD_READ:VD_LISTEN;
sel.innerHTML=Object.keys(obj).map(l=>'<option>'+l+'</option>').join('');
};document.getElementById('qtBook').dispatchEvent(new Event('change'));
<\/script>`;

el.innerHTML=html;

function startQuiz(){
const book=document.getElementById('qtBook').value;
const lesson=document.getElementById('qtLesson').value;
const mode=document.getElementById('qtMode').value;
const count=document.getElementById('qtCount').value;
const obj=book==='수특 영어'?VD_ENG:book==='수특 영독'?VD_READ:VD_LISTEN;
if(!obj[lesson]){showPop('해당 강을 찾을 수 없습니다');return;}

let words=[...obj[lesson]];
if(count==='star'){
words=words.filter(w=>{const st=getVocabState(book,lesson,w[0]);return st.starred;});
if(!words.length){showPop('별표 단어가 없습니다!');return;}
}
// shuffle
for(let i=words.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[words[i],words[j]]=[words[j],words[i]];}
if(count!=='all'&&count!=='star') words=words.slice(0,parseInt(count));

quizState={words,current:0,correct:0,wrongs:[],mode,setName:`${book} ${lesson}`,total:words.length,book,lesson};
renderTab('vocabtest');
}

function renderQuizActive(el){
const q=quizState;
if(q.current>=q.total) return renderQuizResult(el);

const w=q.words[q.current];
const progress=Math.round(q.current/q.total*100);
let questionText='',placeholder='';

if(q.mode==='en2ko'){
questionText=w[0]; placeholder='뜻을 입력하세요';
}else if(q.mode==='ko2en'){
questionText=w[1]; placeholder='영어 단어를 입력하세요';
}else{
questionText='🔊 듣고 영어를 입력하세요'; placeholder='영어 단어를 입력하세요';
setTimeout(()=>speak(w[0]),300);
}

el.innerHTML=`
<div class="card">
<div class="flex" style="justify-content:space-between">
<span style="font-size:.85rem;color:var(--text2)">${q.setName}</span>
<span style="font-size:.85rem;color:var(--text2)">${q.current+1} / ${q.total}</span>
</div>
<div class="progress-bar mt"><div class="progress-fill blue" style="width:${progress}%"></div></div>
</div>
<div class="quiz-box">
<div class="qnum">${q.current+1}번 문제</div>
<div class="q">${questionText}</div>
${q.mode==='listen'?`<button class="btn btn-s mb" onclick="speak('${w[0].replace(/'/g,"\\'")}')">🔊 다시 듣기</button><br>`:''}
<input id="quizInput" placeholder="${placeholder}" autocomplete="off" onkeydown="if(event.key==='Enter')submitAnswer()">
<br><br>
<div class="flex" style="justify-content:center">
<button class="btn btn-p" onclick="submitAnswer()">제출</button>
<button class="btn btn-s" onclick="skipAnswer()">모르겠어요</button>
</div>
</div>`;
setTimeout(()=>{const inp=document.getElementById('quizInput');if(inp)inp.focus();},100);
}

function normalizeAnswer(s){
return s.replace(/\s+/g,' ').trim().toLowerCase()
.replace(/[~,.()\[\]\/\-]/g,'').replace(/\s+/g,' ').trim();
}

function checkAnswer(input,answer){
const ni=normalizeAnswer(input);
// answer가 콤마로 여러 뜻이 있을 수 있음
const parts=answer.split(',').map(s=>normalizeAnswer(s));
// 하나라도 포함하면 정답
for(const p of parts){
if(!p)continue;
if(ni===p)return true;
if(p.includes(ni)&&ni.length>=2)return true;
if(ni.includes(p)&&p.length>=2)return true;
}
return false;
}

function submitAnswer(){
const q=quizState;
const w=q.words[q.current];
const input=document.getElementById('quizInput').value.trim();
if(!input){showPop('답을 입력하세요!');return;}

const correctAnswer=q.mode==='en2ko'?w[1]:w[0];
const isCorrect=checkAnswer(input,correctAnswer);

if(isCorrect){
q.correct++;
showPop(rand(['정답! 👏','맞았어! 잘한다!','오~ 맞았어!','딩동댕! 🎵','역시 잘하네!','완벽! 💯']),'',1500);
}else{
q.wrongs.push({eng:w[0],kor:w[1],myAnswer:input});
showPop(`오답! 정답: ${correctAnswer}`,'',2500);
}
q.current++;
setTimeout(()=>renderTab('vocabtest'),800);
}

function skipAnswer(){
const q=quizState;
const w=q.words[q.current];
q.wrongs.push({eng:w[0],kor:w[1],myAnswer:'(패스)'});
showPop(`정답: ${w[1]} / ${w[0]}`,'',2000);
q.current++;
setTimeout(()=>renderTab('vocabtest'),800);
}

async function renderQuizResult(el){
const q=quizState;
const pct=Math.round(q.correct/q.total*100);

// 칭찬 팝업
setTimeout(()=>showPraise(pct),300);

// DB에 저장
const record={
date:todayStr(),
set_name:q.setName,
correct:q.correct,
total:q.total,
pct,
mode:q.mode==='en2ko'?'영→한':q.mode==='ko2en'?'한→영':'듣기',
quiz_type:'단어시험',
wrongs:q.wrongs
};
await dbInsert('quiz_history',record);
cache.quiz_history=await dbGet('quiz_history');

// 오답을 로컬에도 누적
const existing=JSON.parse(localStorage.getItem('wrong_notes')||'[]');
q.wrongs.forEach(w=>{
const found=existing.find(e=>e.eng===w.eng);
if(found){found.count=(found.count||1)+1;found.lastDate=todayStr();}
else existing.push({eng:w.eng,kor:w.kor,count:1,lastDate:todayStr(),setName:q.setName});
});
localStorage.setItem('wrong_notes',JSON.stringify(existing));

let html=`<div class="card" style="text-align:center">
<h3>📊 시험 결과</h3>
<div style="font-size:3rem;font-weight:700;color:${pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)'};margin:16px 0">${pct}%</div>
<div style="font-size:1.1rem;margin-bottom:8px">${q.correct}개 정답 / ${q.total}개 중</div>
<div style="color:var(--text2);font-size:.85rem">${q.setName} | ${record.mode}</div>
</div>`;

if(q.wrongs.length){
html+=`<div class="card"><h3>❌ 틀린 단어 (${q.wrongs.length}개)</h3>
<table><tr><th>영어</th><th>🔊</th><th>정답</th><th>내 답</th></tr>`;
q.wrongs.forEach(w=>{
html+=`<tr><td style="font-weight:600">${w.eng}</td>
<td><button class="play-btn" onclick="speak('${w.eng.replace(/'/g,"\\'")}')">🔊</button></td>
<td>${w.kor}</td><td style="color:var(--red)">${w.myAnswer}</td></tr>`;
});
html+=`</table></div>`;
}

html+=`<div class="flex" style="justify-content:center;margin-top:12px">
<button class="btn btn-p" onclick="quizState=null;renderTab('vocabtest')">다시 시험보기</button>
<button class="btn btn-g" onclick="quizState=null;renderTab('wrong')">오답노트 보기</button>
<button class="btn btn-s" onclick="quizState=null;renderTab('dash')">대시보드</button>
</div>`;

el.innerHTML=html;
quizState=null;
}

function startWrongQuiz(){

if(notes.length<2){showPop('오답 단어가 2개 이상이어야 합니다');return;}
let words=notes.map(n=>[n.eng,n.kor]);
for(let i=words.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[words[i],words[j]]=[words[j],words[i]];}
if(words.length>30)words=words.slice(0,30);
quizState={words,current:0,correct:0,wrongs:[],mode:'en2ko',setName:'오답노트 재시험',total:words.length,book:'wrong',lesson:'wrong'};
renderTab('vocabtest');
}

// ============================================================
//  📄 본문 탭 (등록 + 시험)
// ============================================================
let passageTestState=null;

function renderPassage(el){
if(passageTestState) return renderPassageTest(el);

const isEditor=ROLE==='teacher'||ROLE==='student';
const passages=cache.passages||[];

let html='';
if(isEditor){
html+=`<div class="card"><h3>📄 본문 등록</h3>
<div class="grid2 mb">
<div><label style="font-size:.8rem;color:var(--text2)">교재</label>
<select id="psBook"><option>수특 영어</option><option>수특 영독</option></select></div>
<div><label style="font-size:.8rem;color:var(--text2)">강-번호</label>
<input id="psNum" placeholder="예: 3-1"></div>
</div>
<input id="psTitle" placeholder="제목 (선택)" class="mb">
<label style="font-size:.8rem;color:var(--text2)">영어 본문</label>
<textarea id="psEng" placeholder="영어 본문을 붙여넣으세요"></textarea>
<label style="font-size:.8rem;color:var(--text2)">한글 해석</label>
<textarea id="psKor" placeholder="한글 해석 (선택)"></textarea>
<label style="font-size:.8rem;color:var(--text2)">해설/구문분석</label>
<textarea id="psMemo" placeholder="해설 메모 (선택)" style="min-height:50px"></textarea>
<button class="btn btn-p mt" onclick="addPassage()">등록</button>
</div>`;
}

html+=`<div class="card"><h3>📄 등록된 본문 (${passages.length}개)</h3>`;
if(!passages.length) html+=`<p style="color:var(--text2)">등록된 본문이 없습니다.</p>`;
passages.forEach(p=>{
html+=`<div class="card" style="border-color:var(--accent)">
<div class="flex" style="justify-content:space-between">
<strong>${p.book||''} ${p.num||''} ${p.title||''}</strong>
<div class="flex">
<button class="btn btn-sm btn-p" onclick="startPassageTest(${p.id},'lv1')">Lv1 빈칸30%</button>
<button class="btn btn-sm btn-o" onclick="startPassageTest(${p.id},'lv2')">Lv2 빈칸60%</button>
<button class="btn btn-sm btn-r" onclick="startPassageTest(${p.id},'lv3')">Lv3 한→영</button>
${isEditor?`<button class="btn btn-sm btn-r" onclick="delPassage(${p.id})">삭제</button>`:''}
</div>
</div>
<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent);font-size:.85rem">본문 보기</summary>
<div style="margin-top:8px;white-space:pre-wrap;font-size:.85rem;line-height:1.7">${p.eng||''}</div>
${p.kor?`<hr><div style="white-space:pre-wrap;font-size:.85rem;color:var(--text2);line-height:1.7">${p.kor}</div>`:''}
${p.memo?`<hr><div style="white-space:pre-wrap;font-size:.8rem;color:var(--yellow);line-height:1.6">💡 ${p.memo}</div>`:''}
</details></div>`;
});
html+=`</div>`;
el.innerHTML=html;
}

async function addPassage(){
const book=document.getElementById('psBook').value;
const num=document.getElementById('psNum').value.trim();
const title=document.getElementById('psTitle').value.trim();
const eng=document.getElementById('psEng').value.trim();
const kor=document.getElementById('psKor').value.trim();
const memo=document.getElementById('psMemo').value.trim();
if(!eng){showPop('영어 본문을 입력하세요');return;}
await dbInsert('passages',{book,num,title,eng,kor,memo});
cache.passages=await dbGet('passages');
renderTab('passage');
showPop('본문이 등록되었습니다! 📄');
}

async function delPassage(id){
if(!confirm('이 본문을 삭제할까요?'))return;
await dbDelete('passages',id);
cache.passages=await dbGet('passages');
renderTab('passage');
}

function startPassageTest(id,level){
const p=(cache.passages||[]).find(x=>x.id===id);
if(!p)return;
passageTestState={passage:p,level,answers:[],submitted:false};
renderTab('passage');
}

function renderPassageTest(el){
const pt=passageTestState;
const p=pt.passage;
if(pt.submitted) return renderPassageResult(el);

let html=`<div class="card"><h3>📝 ${p.book} ${p.num} ${p.title||''} — ${pt.level==='lv1'?'Lv1 빈칸 30%':pt.level==='lv2'?'Lv2 빈칸 60%':'Lv3 한글→영작'}</h3>
<button class="btn btn-sm btn-s mb" onclick="passageTestState=null;renderTab('passage')">← 돌아가기</button></div>`;

if(pt.level==='lv3'){
html+=`<div class="card"><h3>한글 해석</h3>
<div style="white-space:pre-wrap;line-height:1.8;font-size:.95rem">${p.kor||'(한글 해석이 없습니다)'}</div></div>`;
html+=`<div class="card"><h3>영어로 써보세요</h3>
<textarea id="ptAnswer" style="min-height:200px;font-size:.95rem;line-height:1.7" placeholder="영어 본문을 처음부터 끝까지 써보세요"></textarea>
<button class="btn btn-p mt full" onclick="submitPassageTest()">제출</button></div>`;
}else{
const words=p.eng.split(/\s+/);
const pct=pt.level==='lv1'?0.3:0.6;
const blanks=new Set();
while(blanks.size<Math.floor(words.length*pct)){
blanks.add(Math.floor(Math.random()*words.length));
}
pt._blanks=blanks;pt._words=words;

html+=`<div class="card" style="line-height:2.2;font-size:.95rem">`;
words.forEach((w,i)=>{
if(blanks.has(i)){
const clean=w.replace(/[^a-zA-Z'-]/g,'');
html+=`<input style="width:${Math.max(clean.length*10,60)}px;display:inline;font-size:.9rem;padding:2px 4px;margin:2px" data-idx="${i}" class="blank-input" placeholder="${clean.length}글자"> `;
}else{
html+=w+' ';
}
});
html+=`</div><button class="btn btn-p mt full" onclick="submitBlankTest()">제출</button>`;
}
el.innerHTML=html;
}

function submitBlankTest(){
const pt=passageTestState;
const words=pt._words;
const blanks=pt._blanks;
const inputs=document.querySelectorAll('.blank-input');
let correct=0,total=blanks.size,wrongs=[];
inputs.forEach(inp=>{
const idx=parseInt(inp.dataset.idx);
const original=words[idx].replace(/[^a-zA-Z'-]/g,'').toLowerCase();
const answer=inp.value.trim().toLowerCase();
if(answer===original)correct++;
else wrongs.push({original:words[idx],answer:inp.value});
});
const pct=Math.round(correct/total*100);
pt.result={correct,total,pct,wrongs};
pt.submitted=true;
renderTab('passage');
}

function submitPassageTest(){
const pt=passageTestState;
pt.result={answer:document.getElementById('ptAnswer').value,original:pt.passage.eng};
pt.submitted=true;
renderTab('passage');
}

async function renderPassageResult(el){
const pt=passageTestState;
const p=pt.passage;

let html=`<div class="card"><h3>📊 본문 시험 결과</h3>
<button class="btn btn-sm btn-s mb" onclick="passageTestState=null;renderTab('passage')">← 돌아가기</button></div>`;

if(pt.level==='lv3'){
html+=`<div class="card"><h3>내가 쓴 답</h3>
<div style="white-space:pre-wrap;line-height:1.7;font-size:.9rem">${pt.result.answer||''}</div></div>`;
html+=`<div class="card"><h3>정답 본문</h3>
<div style="white-space:pre-wrap;line-height:1.7;font-size:.9rem">${pt.result.original}</div></div>`;
html+=`<div class="card" style="text-align:center"><p style="color:var(--text2)">직접 비교해서 확인하세요! 선생님께 채점 요청하기 좋습니다.</p></div>`;
}else{
const r=pt.result;
const pct=r.pct;
setTimeout(()=>showPraise(pct),300);

// DB 저장
await dbInsert('quiz_history',{
date:todayStr(),set_name:`${p.book} ${p.num}`,
correct:r.correct,total:r.total,pct,
mode:pt.level==='lv1'?'빈칸30%':'빈칸60%',
quiz_type:'본문시험',wrongs:r.wrongs
});
cache.quiz_history=await dbGet('quiz_history');

html+=`<div class="card" style="text-align:center">
<div style="font-size:3rem;font-weight:700;color:${pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)'}">${pct}%</div>
<div>${r.correct} / ${r.total} 정답</div></div>`;

if(r.wrongs.length){
html+=`<div class="card"><h3>❌ 틀린 단어</h3><table><tr><th>정답</th><th>내 답</th></tr>`;
r.wrongs.forEach(w=>{
html+=`<tr><td style="color:var(--green)">${w.original}</td><td style="color:var(--red)">${w.answer||'(빈칸)'}</td></tr>`;
});
html+=`</table></div>`;
}
}
el.innerHTML=html;
}

// ============================================================
//  📈 성적/히스토리 탭
// ============================================================
function renderHistory(el){
const tests=cache.quiz_history||[];
const scores=tests.map(t=>t.pct);
const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
const best=scores.length?Math.max(...scores):0;
const worst=scores.length?Math.min(...scores):0;
const totalTests=tests.length;

// 숙제 완료율
const hw=cache.homework||[];
const hwDone=hw.filter(h=>h.done).length;
const hwRate=hw.length?Math.round(hwDone/hw.length*100):0;

let html=`<div class="card"><h3>📈 성적 종합</h3>
<div class="grid4 mb">
<div class="stat"><div class="num">${totalTests}</div><div class="label">총 시험 수</div></div>
<div class="stat"><div class="num${avg>=80?' green':avg>=50?' yellow':' red'}">${avg}%</div><div class="label">평균 점수</div></div>
<div class="stat"><div class="num green">${best}%</div><div class="label">최고 점수</div></div>
<div class="stat"><div class="num red">${worst}%</div><div class="label">최저 점수</div></div>
</div>
<div class="grid2">
<div class="stat"><div class="num green">${hwRate}%</div><div class="label">숙제 완료율</div></div>
<div class="stat"><div class="num">${getDday()}</div><div class="label">수능 D-Day</div></div>
</div>
</div>`;

// 점수 추이 차트 (최근 20개)
const recent=tests.slice(0,20).reverse();
if(recent.length>1){
html+=`<div class="card"><h3>📊 점수 추이 (최근 ${recent.length}회)</h3>
<div class="chart-bar">`;
recent.forEach(t=>{
const h=Math.max(t.pct*1.1,5);
const color=t.pct>=80?'var(--green)':t.pct>=50?'var(--yellow)':'var(--red)';
html+=`<div class="chart-col">
<div class="bar-label">${t.pct}%</div>
<div class="bar" style="height:${h}px;background:${color}"></div>
<div class="bar-label">${(t.date||'').slice(5)}</div>
</div>`;
});
html+=`</div></div>`;
}

// 주간 리포트
const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
const weekStr=weekAgo.toISOString().slice(0,10);
const weekTests=tests.filter(t=>t.date>=weekStr);
const weekAvg=weekTests.length?Math.round(weekTests.reduce((a,b)=>a+b.pct,0)/weekTests.length):0;
const weekHwDone=hw.filter(h=>h.done&&h.due>=weekStr).length;
const weekHwTotal=hw.filter(h=>h.due>=weekStr).length;

html+=`<div class="card"><h3>📋 주간 리포트</h3>
<div class="grid3">
<div class="stat"><div class="num">${weekTests.length}</div><div class="label">이번 주 시험</div></div>
<div class="stat"><div class="num${weekAvg>=80?' green':' yellow'}">${weekAvg}%</div><div class="label">이번 주 평균</div></div>
<div class="stat"><div class="num green">${weekHwDone}/${weekHwTotal}</div><div class="label">이번 주 숙제</div></div>
</div></div>`;

// 전체 기록
html+=`<div class="card"><h3>📜 전체 시험 기록</h3>`;
if(!tests.length) html+=`<p style="color:var(--text2)">아직 시험 기록이 없습니다.</p>`;
else{
html+=`<table><tr><th>날짜</th><th>유형</th><th>범위</th><th>모드</th><th>점수</th></tr>`;
tests.forEach(t=>{
html+=`<tr><td>${t.date}</td><td>${t.quiz_type||''}</td><td>${t.set_name||''}</td>
<td>${t.mode||''}</td>
<td style="font-weight:700;color:${t.pct>=80?'var(--green)':t.pct>=50?'var(--yellow)':'var(--red)'}">${t.correct}/${t.total} (${t.pct}%)</td></tr>`;
});
html+=`</table>`;
}
html+=`</div>`;

// 부모님용: 오답 빈출 단어 Top 10
if(ROLE==='parent'){
const notes=JSON.parse(localStorage.getItem('wrong_notes')||'[]');
notes.sort((a,b)=>(b.count||1)-(a.count||1));
const top10=notes.slice(0,10);
if(top10.length){
html+=`<div class="card"><h3>⚠️ 자주 틀리는 단어 Top ${top10.length}</h3>
<table><tr><th>영어</th><th>뜻</th><th>틀린 횟수</th></tr>`;
top10.forEach(n=>{
html+=`<tr><td style="font-weight:600">${n.eng}</td><td>${n.kor}</td><td style="color:var(--red)">${n.count}회</td></tr>`;
});
html+=`</table></div>`;
}
}

el.innerHTML=html;
}
