async function dbGet(table,order='id'){
  const{data,error}=await sb.from(table).select('*').order(order,{ascending:true});
  if(error){console.error(error);return[];}return data||[];
}
async function dbInsert(table,row){
  const{data,error}=await sb.from(table).insert(row).select();
  if(error){alert('저장 실패: '+error.message);return null;}return data?.[0];
}
async function dbUpdate(table,id,updates){
  const{error}=await sb.from(table).update(updates).eq('id',id);
  if(error)console.error(error);
}
async function dbDelete(table,id){
  const{error}=await sb.from(table).delete().eq('id',id);
  if(error)console.error(error);
}

async function go(r){role=r;$('R').classList.add('hid');$('HD').classList.remove('hid');$('MN').classList.remove('hid');$('RL').textContent=RN[r];
$('TB').innerHTML=TBS[r].map(t=>`<button data-t="${t[0]}" onclick="sw('${t[0]}')">${t[1]}</button>`).join('');
$('MN').innerHTML='<div class="loading">데이터 불러오는 중</div>';
await loadAll();sw(TBS[r][0][0]);}
function bk(){$('R').classList.remove('hid');$('HD').classList.add('hid');$('MN').classList.add('hid');}
function sw(id){tab=id;document.querySelectorAll('.tb button').forEach(b=>b.classList.toggle('a',b.dataset.t===id));ren();}

function ren(){const m=$('MN');
if(role==='P'){m.innerHTML={over:pOver,sch:()=>schV(0),hw:pHw,score:pScore}[tab]();return;}
m.innerHTML={dash:dashV,sch:()=>schV(role==='T'),hw:()=>hwV(role==='T'),voc:vocV,pass:passV,hist:histV}[tab]();}

// ═══ DASHBOARD ═══
function dashV(){
const up=cache.sch.filter(s=>du(s.date)>=0).length;
const hp=cache.hw.filter(h=>!h.done).length,hd=cache.hw.filter(h=>h.done).length;
const avg=cache.qh.length?Math.round(cache.qh.slice(0,10).reduce((a,b)=>a+b.pct,0)/Math.min(cache.qh.length,10)):'—';
let h=`<div class="sg"><div class="sc"><div class="sn">${up}</div><div class="sl">남은수업</div></div><div class="sc"><div class="sn" style="color:var(--w)">${hp}</div><div class="sl">미완료숙제</div></div><div class="sc"><div class="sn" style="color:var(--ok)">${hd}</div><div class="sl">완료숙제</div></div><div class="sc"><div class="sn">${avg}${typeof avg==='number'?'%':''}</div><div class="sl">평균점수</div></div></div>`;
const u2=cache.sch.filter(s=>du(s.date)>=0).slice(0,3);
h+=`<div class="cd"><div class="ct">📅 다가오는 수업</div>${u2.length?u2.map(s=>siH(s)).join(''):'<div class="empty">예정된 수업 없음</div>'}</div>`;
const pn=cache.hw.filter(x=>!x.done).slice(0,5);
h+=`<div class="cd"><div class="ct">📝 미완료 숙제</div>${pn.length?pn.map(x=>hwI(x)).join(''):'<div class="empty">미완료 숙제 없음 👏</div>'}</div>`;
return h;}

// ═══ SCHEDULE ═══
function schV(e){let h='';
if(e)h+=`<div class="cd"><div class="ct">➕ 수업 추가</div><div class="fr"><div class="fg"><label>날짜</label><input type="date" id="sd" value="${td()}"></div><div class="fg"><label>시간</label><input type="time" id="st" value="19:00"></div></div><div class="fg"><label>수업내용</label><input type="text" id="stt" placeholder="예: 수특 영독 3강 1~4번"></div><div class="fg"><label>메모</label><input type="text" id="sm"></div><button class="btn bp" onclick="addSch()">추가</button></div>`;
h+=`<div class="cd"><div class="ct">📅 수업일정</div>${cache.sch.length?cache.sch.map(s=>siH(s,e)).join(''):'<div class="empty"><div class="ic">📅</div>등록된 수업 없음</div>'}</div>`;return h;}
function siH(s,e){const dt=new Date(s.date+'T00:00:00'),d=du(s.date),lb=d===0?'오늘!':d===1?'내일':d>0?`D-${d}`:'지남';
return`<div class="si"><div class="sd"><div class="d">${dt.getDate()}</div><div class="m">${dt.getMonth()+1}월</div></div><div class="sinf"><div class="t">${s.title}</div><div class="s">${s.time||''} · ${fd(s.date)} · ${lb}${s.memo?' · '+s.memo:''}</div></div>${e?`<button class="btn be" onclick="delSch(${s.id})">삭제</button>`:''}</div>`;}
async function addSch(){const d=$('sd').value,t=$('stt').value.trim();if(!d||!t)return alert('입력!');
await dbInsert('schedules',{date:d,time:$('st').value,title:t,memo:$('sm').value.trim()});await loadAll();sw('sch');}
async function delSch(id){await dbDelete('schedules',id);await loadAll();sw('sch');}

// ═══ HOMEWORK ═══
function hwV(e){let h='';
if(e)h+=`<div class="cd"><div class="ct">➕ 숙제 추가</div><div class="fg"><label>숙제</label><input type="text" id="ht" placeholder="예: 영독 3강 1~4번 본문해석+단어암기"></div><div class="fr"><div class="fg"><label>마감</label><input type="date" id="hdu" value="${td()}"></div><div class="fg"><label>카테고리</label><select id="hc"><option>단어암기</option><option>본문해석</option><option>본문암기</option><option>문법</option><option>리딩</option><option>기타</option></select></div></div><button class="btn bp" onclick="addHw()">추가</button></div>`;
let f=cache.hw;if(hwF==='p')f=f.filter(x=>!x.done);if(hwF==='d')f=f.filter(x=>x.done);
h+=`<div class="cd"><div class="ct">📋 숙제</div><div class="mt"><button class="mb ${hwF==='all'?'a':''}" onclick="hwF='all';ren()">전체</button><button class="mb ${hwF==='p'?'a':''}" onclick="hwF='p';ren()">미완료</button><button class="mb ${hwF==='d'?'a':''}" onclick="hwF='d';ren()">완료</button></div>${f.length?f.map(x=>hwI(x,e)).join(''):'<div class="empty">숙제 없음</div>'}</div>`;return h;}
function hwI(x,e){const d=du(x.due);let b='';if(x.done)b='<span class="bg bg-k">완료</span>';else if(d<0)b='<span class="bg bg-o">기한초과</span>';else if(d<=2)b='<span class="bg bg-d">마감임박</span>';
return`<div class="hw-i ${x.done?'dn':''}"><div class="hw-c" onclick="togHw(${x.id},${!x.done})">${x.done?'✓':''}</div><div style="flex:1"><div class="hw-t">${x.title}</div><div class="hw-m">${x.category||''} · 마감:${fd(x.due)}</div></div>${b}${e?`<button class="btn be" onclick="delHw(${x.id})">삭제</button>`:''}</div>`;}
async function addHw(){const t=$('ht').value.trim(),d=$('hdu').value;if(!t||!d)return alert('입력!');
await dbInsert('homework',{title:t,due:d,category:$('hc').value,done:false});await loadAll();sw('hw');}
async function togHw(id,val){await dbUpdate('homework',id,{done:val});await loadAll();ren();}
async function delHw(id){await dbDelete('homework',id);await loadAll();sw('hw');}

// ═══ VOCAB ═══
function vocV(){const sn=Object.keys(VD);if(!selSet||!VD[selSet])selSet=sn[0];const w=VD[selSet]||[];
let h=`<div class="cd"><div class="ct">📚 단어장</div><div class="sb">${sn.map(s=>`<button class="s-b ${s===selSet?'a':''}" onclick="selSet='${s}';ren()">${s}(${VD[s].length})</button>`).join('')}</div></div>`;
h+=`<div class="cd"><div class="ct">📖 ${selSet} — ${w.length}단어</div><div class="wt">${w.map(x=>`<span>${x[0]}=${x[1]}</span>`).join('')}</div></div>`;
h+=`<div class="cd"><div class="ct">🧪 단어시험</div><div class="mt" style="max-width:220px"><button class="mb ${qm==='engToKor'?'a':''}" onclick="qm='engToKor';ren()">영→한</button><button class="mb ${qm==='korToEng'?'a':''}" onclick="qm='korToEng';ren()">한→영</button></div>
<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px"><button class="btn bp bs" onclick="stQ(0)">전체(${w.length})</button><button class="btn bo bs" onclick="stQ(20)">20문제</button><button class="btn bo bs" onclick="stQ(10)">10문제</button></div><div id="QA"></div></div>`;return h;}

function stQ(n){const w=[...VD[selSet]].sort(()=>Math.random()-.5);qz={w:n?w.slice(0,n):w,i:0,r:[],m:qm,sn:selSet};rQ();}
function rQ(){const e=$('QA');if(!qz)return;
if(qz.i>=qz.w.length){const c=qz.r.filter(x=>x.ok).length,t=qz.r.length,p=Math.round(c/t*100);
saveQuiz(qz.sn,c,t,p,qz.m,'단어',qz.r.filter(x=>!x.ok));
const wr=qz.r.filter(x=>!x.ok);
e.innerHTML=`<div class="qa"><div class="scb">${p}%</div><div style="color:var(--g5);margin:4px 0">${t}문제 중 ${c}개 정답</div>${wr.length?`<div class="wl"><h4>❌ 틀린 단어 (${wr.length}개)</h4>${wr.map(w=>`<div class="wl-i">• <b>${w.q}</b> → ${w.a} ${w.u?'(내답:'+w.u+')':''}</div>`).join('')}</div>`:'<div style="margin-top:10px;color:var(--ok);font-weight:700">🎉 완벽!</div>'}
<button class="btn bp" style="margin-top:12px" onclick="qz=null;sw(tab)">돌아가기</button></div>`;return;}
const w=qz.w[qz.i],q=qz.m==='engToKor'?w[0]:w[1],pr=qz.m==='engToKor'?'뜻을 입력하세요':'영어를 입력하세요';
e.innerHTML=`<div class="qa"><div class="qd">${qz.w.map((_,i)=>{let c='';if(i<qz.i)c=qz.r[i].ok?'ok':'no';if(i===qz.i)c='cur';return`<div class="${c}"></div>`;}).join('')}</div><div style="color:var(--g4);font-size:.75rem">${qz.i+1}/${qz.w.length}</div><div class="qw">${q}</div><div class="qp">${pr}</div><input class="qi" id="QI" placeholder="정답..." onkeydown="if(event.key==='Enter')cQ()"><br><button class="btn bp" style="margin-top:8px" onclick="cQ()">확인</button><div id="QF"></div></div>`;
setTimeout(()=>$('QI')?.focus(),30);}
function cQ(){if(!qz)return;const inp=$('QI').value.trim(),w=qz.w[qz.i],ans=qz.m==='engToKor'?w[1]:w[0],q=qz.m==='engToKor'?w[0]:w[1];
const aa=ans.split(',').map(x=>x.trim().toLowerCase().replace(/\s/g,''));const uc=inp.toLowerCase().replace(/\s/g,'');
const ok=aa.some(a=>a===uc)||uc===ans.toLowerCase().replace(/\s/g,'');
qz.r.push({q,a:ans,u:inp,ok});$('QF').innerHTML=ok?'<div class="qf ok">✅ 정답!</div>':`<div class="qf no">❌ 정답: <b>${ans}</b></div>`;
setTimeout(()=>{qz.i++;rQ();},ok?600:1400);}

async function saveQuiz(sn,c,t,p,m,tp,wr){
await dbInsert('quiz_history',{date:td(),set_name:sn,correct:c,total:t,pct:p,mode:m,quiz_type:tp,wrongs:wr});
cache.qh.unshift({date:td(),set_name:sn,correct:c,total:t,pct:p,mode:m,quiz_type:tp,wrongs:wr});}

function passV(){
const ps=cache.pass;let h='';
if(role==='T'){
h+=`<div class="cd"><div class="ct">➕ 본문 추가 (지문 단위)</div>
<div class="fr"><div class="fg"><label>교재</label><select id="pB"><option>수특 영어</option><option>수특 영독</option></select></div><div class="fg"><label>강-번호 (예: 3-1)</label><input type="text" id="pN" placeholder="3-1"></div></div>
<div class="fg"><label>제목 (선택)</label><input type="text" id="pT" placeholder="예: 정서적 행동과 환경"></div>
<div class="fg"><label>영어 본문</label><textarea id="pE" placeholder="영어 원문 붙여넣기. 문장마다 줄바꿈 권장."></textarea></div>
<div class="fg"><label>한글 해석 (Lv3용)</label><textarea id="pK" placeholder="한글 해석 붙여넣기. 같은 순서로 줄바꿈."></textarea></div>
<button class="btn bp" onclick="addPass()">저장</button></div>`;}

h+=`<div class="cd"><div class="ct">📖 저장된 본문 (${ps.length}개)</div>`;
if(!ps.length)h+='<div class="empty"><div class="ic">📖</div>선생님이 본문을 추가하면 여기에 나타납니다</div>';
else{const grp={};ps.forEach(p=>{if(!grp[p.book])grp[p.book]=[];grp[p.book].push(p);});
for(const bk of Object.keys(grp)){h+=`<div style="font-weight:700;font-size:.8rem;margin:6px 0 3px;color:var(--g6)">${bk}</div>`;
grp[bk].sort((a,b)=>a.num.localeCompare(b.num,undefined,{numeric:true}));
h+=grp[bk].map(p=>`<div class="pi"><div class="pt">${p.book} ${p.num} ${p.title?'— '+p.title:''}</div><div class="ps">${p.eng.split('\\n').filter(x=>x.trim()).length}문장</div></div>${role==='T'?`<button class="btn be" onclick="delPass(${p.id})">삭제</button>`:''}`).join('');}}
h+=`</div>`;

if(ps.length){
h+=`<div class="cd"><div class="ct">📝 범위 선택 본문 시험</div>
<div class="rng" id="PR">${ps.sort((a,b)=>(a.book+a.num).localeCompare(b.book+b.num,undefined,{numeric:true})).map(p=>`<label><input type="checkbox" value="${p.id}"> ${p.book} ${p.num}</label>`).join('')}</div>
<div class="mt" style="max-width:360px">
<button class="mb ${passLv===1?'a':''}" onclick="passLv=1;ren()">Lv1 빈칸30%</button>
<button class="mb ${passLv===2?'a':''}" onclick="passLv=2;ren()">Lv2 빈칸60%</button>
<button class="mb ${passLv===3?'a':''}" onclick="passLv=3;ren()">Lv3 한→영</button>
</div><button class="btn bp" onclick="stPass()">시험 시작</button><div id="PA"></div></div>`;}
return h;}

async function addPass(){const b=$('pB').value,n=$('pN').value.trim(),t=$('pT').value.trim(),e=$('pE').value.trim(),k=$('pK').value.trim();
if(!n||!e)return alert('강-번호와 영어 본문 필수!');
await dbInsert('passages',{book:b,num:n,title:t,eng:e,kor:k});await loadAll();sw('pass');}
async function delPass(id){if(!confirm('삭제?'))return;await dbDelete('passages',id);await loadAll();sw('pass');}

function stPass(){
const ck=document.querySelectorAll('#PR input:checked');
const ids=[...ck].map(c=>parseInt(c.value));
if(!ids.length)return alert('시험 볼 본문을 선택하세요!');
const ps=cache.pass.filter(p=>ids.includes(p.id));
const el=$('PA');

if(passLv<=2){
const rate=passLv===1?0.3:0.6;
let sents=[];ps.forEach(p=>{p.eng.split('\n').filter(x=>x.trim()).forEach(l=>{sents.push({t:l,bk:p.book,nm:p.num});});});
let html=`<div style="margin-top:12px"><div style="font-weight:700;margin-bottom:6px">📝 Lv${passLv} 빈칸(${Math.round(rate*100)}%) — ${sents.length}문장</div>`;
sents.forEach(s=>{
const ws=s.t.split(/\s+/);const bi=new Set();const tg=Math.max(1,Math.round(ws.length*rate));
while(bi.size<tg&&bi.size<ws.length){const r=Math.floor(Math.random()*ws.length);if(ws[r].replace(/[^a-zA-Z]/g,'').length<=2&&bi.size<tg-1)continue;bi.add(r);}
let ln='';ws.forEach((w,i)=>{if(bi.has(i)){const cl=w.replace(/[^a-zA-Z'-]/g,''),pu=w.replace(cl,'');ln+=`<input class="p-inp" data-ans="${cl}" style="width:${Math.max(35,cl.length*8)}px">${pu} `;}else ln+=w+' ';});
html+=`<div class="p-line"><span style="color:var(--g4);font-size:.62rem">${s.bk} ${s.nm}</span> ${ln}</div>`;});
html+=`<div style="margin-top:10px"><button class="btn bp" onclick="chkBlanks()">채점</button> <span id="PR2" style="font-weight:700;margin-left:6px"></span></div></div>`;
el.innerHTML=html;
}else{
let sents=[];ps.forEach(p=>{const el2=p.eng.split('\n').filter(x=>x.trim()),kl=p.kor?p.kor.split('\n').filter(x=>x.trim()):[];
el2.forEach((e2,i)=>{sents.push({e:e2,k:kl[i]||'(해석 없음)',bk:p.book,nm:p.num});});});
let html=`<div style="margin-top:12px"><div style="font-weight:700;margin-bottom:6px">📝 Lv3 한→영 — ${sents.length}문장</div>`;
sents.forEach(s=>{const hint=s.e.split(/\s+/).slice(0,2).join(' ')+'...';
html+=`<div style="background:var(--g0);padding:8px;border-radius:7px;margin-bottom:5px"><div style="font-size:.8rem;font-weight:600">${s.k}</div><div style="font-size:.65rem;color:var(--g4)">힌트: ${hint} | ${s.bk} ${s.nm}</div><textarea class="p-ea" data-ans="${s.e.replace(/"/g,'&quot;')}" style="width:100%;padding:5px 7px;border:1.5px solid var(--g2);border-radius:6px;font-size:.82rem;font-family:inherit;min-height:36px;resize:none" placeholder="영어로..."></textarea></div>`;});
html+=`<button class="btn bp" style="margin-top:6px" onclick="chkEng()">채점</button><div id="PR2" style="margin-top:6px"></div></div>`;
el.innerHTML=html;}}

async function chkBlanks(){
const ins=document.querySelectorAll('.p-inp[data-ans]');let c=0,t=ins.length;
ins.forEach(inp=>{const a=inp.dataset.ans.toLowerCase().replace(/[^a-z'-]/g,''),v=inp.value.trim().toLowerCase().replace(/[^a-z'-]/g,'');
if(v===a){inp.classList.add('ok');inp.classList.remove('no');c++;}else{inp.classList.add('no');inp.classList.remove('ok');inp.title='정답:'+inp.dataset.ans;}});
const p=Math.round(c/t*100);$('PR2').innerHTML=`${c}/${t} (${p}%) ${p>=80?'👏':'😢'}`;
await saveQuiz(`본문Lv${passLv}`,c,t,p,'','본문',[]);}

async function chkEng(){
const tas=document.querySelectorAll('.p-ea');let c=0,t=tas.length;
tas.forEach(ta=>{const ans=ta.dataset.ans.trim(),val=ta.value.trim();
const aw=ans.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/),vw=val.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/);
const m=aw.filter(w=>vw.includes(w)).length,r=aw.length?m/aw.length:0;
if(r>=0.8){c++;ta.style.borderColor='var(--ok)';ta.style.background='var(--ob)';}
else{ta.style.borderColor='var(--e)';ta.style.background='var(--eb)';const d=document.createElement('div');d.style.cssText='font-size:.72rem;color:var(--e);margin-top:1px';d.textContent='정답: '+ans;ta.parentElement.appendChild(d);}});
const p=Math.round(c/t*100);$('PR2').innerHTML=`<div style="font-weight:700;color:var(--p)">${c}/${t} (${p}%)</div>`;
await saveQuiz('본문Lv3 한→영',c,t,p,'','본문',[]);}

// ═══ HISTORY ═══
function histV(){
let h=`<div class="cd"><div class="ct">📊 시험 기록</div>`;
if(!cache.qh.length){h+='<div class="empty">기록 없음</div></div>';return h;}
h+=cache.qh.slice(0,30).map(x=>`<div class="hi"><div><div style="font-weight:600;font-size:.8rem">${x.quiz_type==='본문'?'📖':'🔤'} ${x.set_name} <span style="font-size:.66rem;color:var(--g4)">${x.mode||''}</span></div><div style="font-size:.68rem;color:var(--g4)">${fd(x.date)} · ${x.total}문제 · ${x.correct}정답</div></div><div class="hs ${x.pct>=70?'gd':'bd'}">${x.pct}%</div></div>`).join('');
if(role==='T')h+=`<div style="margin-top:8px;text-align:right"><button class="btn be" onclick="clearHist()">전체삭제</button></div>`;
h+=`</div>`;return h;}
async function clearHist(){if(!confirm('전체 삭제?'))return;
for(const r of cache.qh)await dbDelete('quiz_history',r.id);cache.qh=[];ren();}

// ═══ PARENT ═══
function pOver(){
const up=cache.sch.filter(s=>du(s.date)>=0).length;
const hwT=cache.hw.length,hwD=cache.hw.filter(x=>x.done).length,hwR=hwT?Math.round(hwD/hwT*100):0;
const avg=cache.qh.length?Math.round(cache.qh.slice(0,10).reduce((a,b)=>a+b.pct,0)/Math.min(cache.qh.length,10)):0;
let h=`<div class="sg"><div class="sc"><div class="sn">${up}</div><div class="sl">남은수업</div></div><div class="sc"><div class="sn" style="color:${hwR>=80?'var(--ok)':'var(--w)'}">${hwR}%</div><div class="sl">숙제완료율</div></div><div class="sc"><div class="sn">${avg||'—'}${avg?'%':''}</div><div class="sl">평균점수</div></div><div class="sc"><div class="sn">${cache.qh.length}</div><div class="sl">총시험수</div></div></div>`;
if(cache.qh.length){const rec=cache.qh.slice(0,8).reverse();
h+=`<div class="cd"><div class="ct">📈 점수 추이</div><div class="chart-bar">${rec.map(r=>{const c=r.pct>=80?'var(--ok)':r.pct>=60?'var(--w)':'var(--e)';return`<div class="chart-col"><div style="font-size:.6rem;font-weight:700">${r.pct}%</div><div class="chart-fill" style="height:${r.pct}%;background:${c};min-height:3px"></div><div style="font-size:.48rem;color:var(--g4)">${(r.set_name||'').slice(0,6)}</div></div>`;}).join('')}</div></div>`;}
const od=cache.hw.filter(x=>!x.done&&du(x.due)<0);
if(od.length)h+=`<div class="cd" style="border-left:3px solid var(--e)"><div class="ct">⚠️ 기한초과 ${od.length}개</div>${od.map(x=>`<div style="font-size:.8rem">${x.title} (마감:${fd(x.due)})</div>`).join('')}</div>`;
return h;}
function pHw(){let h=`<div class="cd"><div class="ct">📝 숙제현황</div>`;if(!cache.hw.length){h+='<div class="empty">숙제없음</div></div>';return h;}
h+=cache.hw.map(x=>hwI(x)).join('');h+=`</div>`;return h;}
function pScore(){let h=`<div class="cd"><div class="ct">📊 성적표</div>`;
if(!cache.qh.length){h+='<div class="empty">기록없음</div></div>';return h;}
const avg=Math.round(cache.qh.reduce((a,b)=>a+b.pct,0)/cache.qh.length);
const best=Math.max(...cache.qh.map(x=>x.pct));
h+=`<div class="sg"><div class="sc"><div class="sn">${avg}%</div><div class="sl">전체평균</div></div><div class="sc"><div class="sn" style="color:var(--ok)">${best}%</div><div class="sl">최고점수</div></div><div class="sc"><div class="sn">${cache.qh.length}</div><div class="sl">총시험수</div></div></div>`;
h+=cache.qh.slice(0,20).map(x=>{let wr='';if(x.wrongs?.length)wr=`<div style="font-size:.68rem;color:var(--e);margin-top:1px">틀린것: ${x.wrongs.map(w=>'<b>'+(w.q||'')+'</b>').join(', ')}</div>`;
return`<div class="hi" style="flex-direction:column;align-items:stretch"><div style="display:flex;justify-content:space-between"><div><div style="font-weight:600;font-size:.8rem">${x.quiz_type==='본문'?'📖':'🔤'} ${x.set_name}</div><div style="font-size:.68rem;color:var(--g4)">${fd(x.date)} · ${x.total}문제</div></div><div class="hs ${x.pct>=70?'gd':'bd'}">${x.pct}%</div></div>${wr}</div>`;}).join('');
h+=`</div>`;return h;}
</script>
</body>
</html>
